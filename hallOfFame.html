<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess 2 - Hall of Fame</title>
    <link rel="stylesheet" href="/src/main.css">
    <style>
        body {
            background-color: #2e2e2e;
            color: #f0d9b5;
            font-family: 'Quicksand', sans-serif; font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
                    font-size: 18px;
}
        .container {
            width: 95%;
            max-width: 1200px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        button {
            padding: 10px 20px;
            background: #829769;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 28px;
            font-weight: bold;
        }
        button:hover {
            background: #6a7d55;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 26px;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #444;
        }
        th {
            background-color: #333;
        }
        .filter-tag {
            display: inline-block;
            padding: 2px 4px;
            margin: 1px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            color: #1a1a1a;
        }
        .filter-ra { background-color: #ff6b6b; }
        .filter-rna { background-color: #4ecdc4; }
        .filter-rr { background-color: #ffe66d; }
    </style>
    <script src="/src/jsonfn.js"></script>
<script src="/src/modal.js?v=1"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Quicksand:wght@500;700&display=swap');</style>
    </head>
<body>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Hall of Fame</h1>
            <div>
                <button onclick="openHofFightModal()" style="background: #e67e22;">Fight Bots</button>
                <button onclick="showHofHistory()" style="background: #9b59b6;">Fight History</button>
                <a href="/evolution.html"><button>Back to Evolution</button></a>
            </div>
        </div>
        <p>The greatest evolved minds, saved for eternity.</p>
        
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>ID</th>
                    <th>Race</th>
                    <th>ELO</th>
                    <th>Games</th>
                    <th>Alg</th>
                    <th>Depth</th>
                    <th>Filters</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="hof-list">
                <!-- Entries -->
            </tbody>
        </table>

        <div id="raceSelectionModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
            <div style="background:#1a1a1a; padding:30px; border-radius: 12px; text-align:center; min-width:300px; box-shadow: 0 8px 16px rgba(0,0,0,0.3);">
                <h2 style="margin-top:0;">Choose Your Race</h2>
                <select id="playerRaceSelect" style="padding:10px; font-size: 28px; margin:20px 0; width:100%; background:#333; color:#f0d9b5; border:1px solid #555; border-radius: 12px;">
                    <!-- Options populated by JS -->
                </select>
                <br>
                <div style="display:flex; justify-content:space-between; gap:10px;">
                    <button onclick="confirmPlay()" style="flex:1;">Start Game</button>
                    <button onclick="closeRaceModal()" style="background:#555; flex:1;">Cancel</button>
                </div>
            </div>
        </div>

        <div id="hofFightModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
            <div style="background:#1a1a1a; padding:30px; border-radius: 12px; text-align:center; min-width:400px; box-shadow: 0 8px 16px rgba(0,0,0,0.3);">
                <h2 style="margin-top:0;">Hall of Fame Fight</h2>
                <div style="display:flex; justify-content:space-between; align-items:center; gap: 20px;">
                    <div style="flex:1;">
                        <h3>White Bot</h3>
                        <select id="whiteBotSelect" style="padding:10px; width:100%; background:#333; color:#f0d9b5; border:1px solid #555;"></select>
                    </div>
                    <div><h1>VS</h1></div>
                    <div style="flex:1;">
                        <h3>Black Bot</h3>
                        <select id="blackBotSelect" style="padding:10px; width:100%; background:#333; color:#f0d9b5; border:1px solid #555;"></select>
                    </div>
                </div>
                <div id="fightStatus" style="margin-top: 20px; font-weight: bold; color: #4ecdc4;"></div>
                <div style="display:flex; justify-content:space-between; gap:10px; margin-top:20px;">
                    <button id="startFightBtn" onclick="startHofFight()" style="flex:1; background:#e67e22;">Fast Fight!</button>
                    <button id="watchFightBtn" onclick="watchHofFight()" style="flex:1; background:#829769;">Watch Live</button>
                    <button onclick="closeHofFightModal()" style="background:#555; flex:1;">Close</button>
                </div>
            </div>
        </div>

        <div id="historyModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center;">
            <div style="background:#1a1a1a; padding:20px; border-radius: 12px; width:80%; max-height:80%; overflow-y:auto; position:relative;">
                <button onclick="document.getElementById('historyModal').style.display='none'" style="position:absolute; top:10px; right:10px; background:#555;">Close</button>
                <h2>Hall of Fame Fights History</h2>
                <div id="historyContent">Loading...</div>
            </div>
        </div>
    </div>
    
    <script src="/hallOfFame.js"></script>
</body>
</html>
