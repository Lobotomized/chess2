    </script>
    <script>
        const chessboard = document.getElementById("chessboard");
        const columnsInput = document.getElementById("columns");
        const rowsInput = document.getElementById("rows");
        const changeDimensionsButton = document.getElementById("changeDimensions");
        const removeSquaresButton = document.getElementById("removeSquares");
        const addSquaresButton = document.getElementById("addSquares");
        
        const generateArrayButton = document.getElementById("generateArray");
        const generateJSONButton = document.getElementById("generateJSON");
        
        const previewBoard = document.getElementById("previewBoard");
        const createPieceModeBtn = document.getElementById("createPieceModeBtn");
        const createPiecePanel = document.getElementById("createPiecePanel");
        const customImageContainer = document.getElementById("customImageContainer");
        const customPieceName = document.getElementById("customPieceName");
        const customPieceValue = document.getElementById("customPieceValue");
        const customPiecePosValue = document.getElementById("customPiecePosValue");
        const moveTypeSelect = document.getElementById("moveType");
        const moveXInput = document.getElementById("moveX");
        const moveYInput = document.getElementById("moveY");
        const blockableOptions = document.getElementById("blockableOptions");
        const moveRepeatCheckbox = document.getElementById("moveRepeat");
        const moveLimitInput = document.getElementById("moveLimit");
        const moveImpotentCheckbox = document.getElementById("moveImpotent");
        const addMoveBtn = document.getElementById("addMoveBtn");
        const currentMovesList = document.getElementById("currentMovesList");
        const saveCustomPieceBtn = document.getElementById("saveCustomPieceBtn");
        const cancelEditPieceBtn = document.getElementById("cancelEditPieceBtn");
        const editOldPieceBtn = document.getElementById("editOldPieceBtn");
        const editCustomPieceModal = document.getElementById("editCustomPieceModal");
        const closeEditModalBtn = document.getElementById("closeEditModalBtn");
        const editModalPiecesContainer = document.getElementById("editModalPiecesContainer");

        const specialHook = document.getElementById("specialHook");
        const conditionsContainer = document.getElementById("conditionsContainer");
        const addAnotherConditionBtn = document.getElementById("addAnotherConditionBtn");
        const specialEffect = document.getElementById("specialEffect");
        const specialEffX = document.getElementById("specialEffX");
        const specialEffY = document.getElementById("specialEffY");
        const specialEffParam = document.getElementById("specialEffParam");
        const specialEffParamVictory = document.getElementById("specialEffParamVictory");
        const specialEffParamLabel = document.getElementById("specialEffParamLabel");
        const addSpecialMoveBtn = document.getElementById("addSpecialMoveBtn");
        const currentSpecialMovesList = document.getElementById("currentSpecialMovesList");

        specialEffect.addEventListener("change", (e) => {
            if (e.target.value === "causeVictory") {
                specialEffParam.style.display = "none";
                specialEffParamVictory.style.display = "block";
                specialEffParamLabel.textContent = "Effect Param (Who wins):";
            } else {
                specialEffParam.style.display = "block";
                specialEffParamVictory.style.display = "none";
                specialEffParamLabel.textContent = "Effect Param (Piece to Spawn/Morph):";
            }
        });

        const customPiecesSubmenu = document.getElementById("customPiecesSubmenu");
        const customPiecesContainer = document.getElementById("customPiecesContainer");

        let removeMode = false;
        let addMode = false;
        let selectedImage = null;
        let selectedCustomImage = null;
        let customPieceMoves = [];
        let customPieceSpecialMoves = [];
        const customPieces = []; // Store custom pieces created by the user
        const piecesObjectArray = [];
        
        function generateChessboard(cols, rows) {
            chessboard.innerHTML = "";
            chessboard.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            chessboard.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
        
            for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const square = document.createElement("div");
                square.classList.add("square");
                square.classList.add((r + c) % 2 === 0 ? "white" : "black");
                chessboard.appendChild(square);
                square.dataset.x = c; // Store x coordinate
                square.dataset.y = r; // Store y coordinate
        
                square.addEventListener("click", () => {
                if (removeMode) {
                    square.style.background = "transparent"; // Changed from black to transparent for better visibility of "removed"
                    square.style.border = "1px dashed rgba(0,0,0,0.2)";
                    square.innerHTML = "";
                }
                else if(addMode){
                    square.style.background = "";
                    square.style.border = "";
                    square.classList.remove("white", "black");
                    square.classList.add((r + c) % 2 === 0 ? "white" : "black");
                }
        
                if (selectedImage && square.style.background !== "transparent") { // Check if an image is selected
        
                    const existingPieceIndex = piecesObjectArray.findIndex(piece => piece.x === c && piece.y === r); 
        
                    if (existingPieceIndex !== -1) { 
                    // Remove the existing piece if found
                    piecesObjectArray.splice(existingPieceIndex, 1); 
                    } 
                    // Create a new image element to place on the square
                    const newImg = document.createElement('img');
                    newImg.src = selectedImage.src;
                    newImg.alt = selectedImage.alt;
        
                    let pieceColor = 'white';
                    // Determine color based on which color button was last clicked or image src
                    if (selectedImage.src.includes('black')) {
                        pieceColor = 'black';
                    }
                    
                    // Clear existing content in the square and append the new image
                    square.innerHTML = '';
                    square.appendChild(newImg);
                    
                    if (selectedImage.dataset.customId) {
                        // It's a custom piece
                        const customPieceDef = customPieces.find(p => p.id === selectedImage.dataset.customId);
                        piecesObjectArray.push({
                            x: c,
                            y: r,
                            color: pieceColor,
                            pieceType: unitImages[customPieceDef.imageName],
                            isCustom: true,
                            customDef: customPieceDef
                        });
                    } else {
                        // Regular piece
                        piecesObjectArray.push({
                            x:c,
                            y:r,  
                            color:pieceColor,
                            pieceType:unitImages[newImg.alt]
                        });
                    }
                }
                });
            }
            }
        }
        
        // Initial chessboard on load
        generateChessboard(8, 8);
        
        changeDimensionsButton.addEventListener("click", () => {
            const newCols = parseInt(columnsInput.value, 10);
            const newRows = parseInt(rowsInput.value, 10);
        
            if (newCols >= 1 && newRows >= 1) {
            generateChessboard(newCols, newRows);
            } else {
            showAlert("Invalid dimensions. Both values must be at least 1.");
            }
        });
        
        generateArrayButton.addEventListener("click", () => {
            const squaresArray = Array.from(chessboard.children)
            .filter(square => square.style.background !== "transparent" && square.style.background !== "black") // Include only visible squares
            .map(square => ({
                light: false, 
                x: parseInt(square.dataset.x, 10),
                y: parseInt(square.dataset.y, 10)
            }));
            
            let variantName = document.getElementById('variantName').value
            let errorSpan = document.getElementById('error')

            if(!variantName || variantName === ''){
            errorSpan.innerHTML = 'Name is mandatory'
            return;
            }
            errorSpan.innerHTML = ''
            fetch('/maps', {
                method: 'POST',
                headers: {
                'Content-Type': 'application/json',
                ...Auth.getAuthHeaders()
                },
                body: JSON.stringify({
                name:variantName,
                squares:squaresArray,
                pieces:piecesObjectArray
                })
            })
            .then(response => response.json())
            .then(data => {
                // After successful save, redirect to hotseat with the new map id
                window.location.href = `/hotseat?gameType=customMap&customGameId=${data._id}&AIColor=black&AIPowerBlack=101`;
            })
            .catch((error) => {
                console.error('Error:', error);
                showAlert('Error saving map');
            });
        });

        generateJSONButton.addEventListener("click", () => {
            const squaresArray = Array.from(chessboard.children)
                .filter(square => square.style.background !== "transparent" && square.style.background !== "black")
                .map(square => ({
                    light: false, 
                    x: parseInt(square.dataset.x, 10),
                    y: parseInt(square.dataset.y, 10),
                    _id: "generated_" + Math.random().toString(36).substr(2, 9) 
                }));

            const pieces = piecesObjectArray.map(p => {
                if (p.isCustom) {
                    let adjustedMoves = JSON.parse(JSON.stringify(p.customDef.moves));
                    if (p.color === 'black') {
                        adjustedMoves = adjustedMoves.map(move => {
                            if (move.y !== undefined) move.y = -move.y;
                            if (move.offsetY !== undefined) move.offsetY = -move.offsetY;
                            return move;
                        });
                    }
                    return {
                        x: p.x,
                        y: p.y,
                        color: p.color,
                        moves: adjustedMoves,
                        name: p.customDef.name,
                        icon: p.color + p.pieceType,
                        value: p.customDef.value !== undefined ? p.customDef.value : 3,
                        posValue: p.customDef.posValue !== undefined ? p.customDef.posValue : 2
                    };
                }
                
                const imageName = p.pieceType; 
                const name = imageName.replace('.png', '');
                const lowerName = name.charAt(0).toLowerCase() + name.slice(1);
                
                let factory = window[lowerName + 'Factory'];
                if (!factory) factory = window[lowerName];
                
                if (factory) {
                    return factory(p.color, p.x, p.y);
                } else {
                    console.error("No factory found for " + imageName);
                    return null;
                }
            }).filter(p => p !== null);

            const state = {
                state: {
                    pieces: pieces,
                    board: squaresArray,
                    turn: "white"
                }
            };
            
            let jsonString;
            if (window.JSONfn) {
                jsonString = window.JSONfn.stringify(state);
            } else {
                jsonString = JSON.stringify(state, null, 2);
            }
            
            
            const win = window.open("", "JSON Output", "width=800,height=600");
            win.document.body.innerHTML = '<textarea style="width:100%;height:100%;font-family:monospace;padding:10px;">' + jsonString + '</textarea>';
        });
        
        removeSquaresButton.addEventListener("click", () => {
            removeMode = !removeMode;
        
            if (removeMode) {
            removeSquaresButton.textContent = "Exit Remove Mode";
            removeSquaresButton.classList.add("active-mode");
            addSquaresButton.classList.remove("active-mode");
            addSquaresButton.textContent = "Add Squares";
        
            addMode = false;
        
            } else {
            removeSquaresButton.textContent = "Remove Squares";
            removeSquaresButton.classList.remove("active-mode");
            }
        });
        
        addSquaresButton.addEventListener("click", () => {
            addMode = !addMode;
        
            if (addMode) {
            addSquaresButton.textContent = "Exit Add Mode";
            addSquaresButton.classList.add("active-mode");
            removeSquaresButton.classList.remove("active-mode");
            removeSquaresButton.textContent = "Remove Squares";
        
            removeMode = false;
            } else {
            addSquaresButton.textContent = "Add Squares";
            addSquaresButton.classList.remove("active-mode");
            }
        });
        
        // Get references to the new buttons and the menu
        const createBoardButton = document.getElementById("createBoard");
        const placePiecesButton = document.getElementById("placePieces");
        const menu = document.getElementById("menu");
        const pieces = document.getElementById("pieces");
        const imageContainer = document.getElementById("imageContainer");
        const showWhiteButton = document.getElementById("showWhite");
        const showBlackButton = document.getElementById("showBlack");
        
        // Object with unit image names
        const unitImages = {
            queenBugImage: "QueenBug.png",
            kingImage: "King.png",
            shroomImage: "Shroom.png",
            pawnImage: "Pawn.png",
            goliathBugImage: "GoliathBug.png",
            antImage: "Ant.png",
            knightImage: "Knight.png",
            rookImage: "Rook.png",
            queenImage: "Queen.png",
            bishopImage: "Bishop.png",
            dragonImage: "Dragon.png",
            ricarImage: "Ricar.png",
            horseImage: "Horse.png",
            ghostImage: "Ghost.png",
            hatImage: "Hat.png",
            clownImage: "Clown.png",
            pigImage: "Pig.png",
            ladyBugImage: "LadyBug.png",
            spiderImage: "Spider.png",
            swordsMenImage: "SwordsMen.png",
            northernKingImage: "NorthernKing.png",
            pikemanImage: "Pikeman.png",
            gargoyleImage: "Gargoyle.png",
            fencerImage: "Fencer.png",
            generalImage: "General.png",
            shieldImage: "Shield.png",
            plagueDoctorImage: "PlagueDoctor.png",
            starManImage: "StarMan.png",
            sleepingDragonImage: "SleepingDragon.png",
            cyborgImage: "Cyborg.png",
            crystalImage: "Crystal.png",
            empoweredCrystalImage: "CrystalEmpowered.png",
            executorImage: "Executor.png",
            juggernautImage: "Juggernaut.png",
            bootVesselImage: "BootVessel.png",
        
            electricCatImage: "ElectricCat.png",
            longCatImage: "LongCat.png",
            scaryCatImage: "ScaryCat.png",
            blindCatImage: "BlindCat.png",
            fatCatImage: "FatCat.png",
            cuteCatImage: "CuteCat.png"
        };
        
        // Function to generate images in the container
        function generateImages(color) {
            imageContainer.innerHTML = ""; 
            if (customImageContainer.children.length === 0) {
                // Populate custom image container only once
                for (const unit in unitImages) {
                    const img = document.createElement("img");
                    img.src = '/static/white' + unitImages[unit];
                    img.alt = unit;
                    img.style.width = "100%";
                    img.style.cursor = "pointer";
                    img.style.padding = "2px";
                    img.style.borderRadius = "4px";
                    customImageContainer.appendChild(img);

                    img.addEventListener("click", () => {
                        if (selectedCustomImage) selectedCustomImage.style.background = "";
                        selectedCustomImage = img;
                        selectedCustomImage.style.background = "var(--selected)";
                        updatePreviewBoard();
                    });

                    // Also populate the special effect param dropdown with factory names
                    const name = unitImages[unit].replace('.png', '');
                    const lowerName = name.charAt(0).toLowerCase() + name.slice(1);
                    
                    let factoryString = lowerName + 'Factory';
                    if (factoryString === 'queenBugFactory') {
                        factoryString = 'queenbugFactory';
                    }
                    
                    const option = document.createElement("option");
                    option.value = factoryString;
                    option.textContent = name + " (" + factoryString + ")";
                    specialEffParam.appendChild(option);
                }
            }

            for (const unit in unitImages) {
                const img = document.createElement("img");
                img.src = '/static/'+color + unitImages[unit];
                img.alt = unit;
                imageContainer.appendChild(img);
        
                img.addEventListener("click", () => {
                if (selectedImage == img) { //Check if user clicked on selected image
                    selectedImage.classList.remove("selected");
                    selectedImage = null;
                }else{
                    // Deselect the previously selected image (if any)
                    if (selectedImage) {
                        const prevWrapper = selectedImage.closest('.custom-piece-wrapper');
                        if (prevWrapper) prevWrapper.classList.remove("selected");
                        selectedImage.classList.remove("selected");
                    }
        
                    // Select the new image and store it in the variable
                    selectedImage = img;
                    selectedImage.classList.add("selected");
                }
                });
        
            }
            
            // Fix: Reset button styles first
            showWhiteButton.style.background = "";
            showBlackButton.style.background = "";
            
            // Apply active style
            if (color === "white") {
                showWhiteButton.style.background = "var(--threat)";
                showWhiteButton.style.color = "white";
            } else {
                showBlackButton.style.background = "var(--threat)";
                showBlackButton.style.color = "white";
            }
        }
        
        // Create Piece logic
        moveTypeSelect.addEventListener("change", (e) => {
            if (moveTypeSelect.value === "blockable") {
                blockableOptions.style.display = "block";
            } else {
                blockableOptions.style.display = "none";
            }
        });

        addMoveBtn.addEventListener("click", () => {
            const type = moveTypeSelect.value;
            const x = parseInt(moveXInput.value, 10) || 0;
            const y = parseInt(moveYInput.value, 10) || 0;
            const impotent = moveImpotentCheckbox.checked;
            
            if (x === 0 && y === 0) {
                showAlert("Move offset cannot be 0,0");
                return;
            }

            let move = { type, x, y };
            if (impotent) move.impotent = true;
            
            if (type === "blockable") {
                move.repeat = moveRepeatCheckbox.checked;
                const limit = parseInt(moveLimitInput.value, 10);
                if (limit > 0) move.limit = limit;
            }

            customPieceMoves.push(move);
            updateMovesList();
            updatePreviewBoard();
        });

        // Attach event listener to existing first condition row
        const firstRow = document.querySelector('.condition-row');
        if (firstRow) {
            attachConditionRowListeners(firstRow);
        }

        function attachConditionRowListeners(row) {
            const conditionSelect = row.querySelector('.specialCondition');
            const condXLabel = row.querySelector('.specialCondXLabel');
            const condX = row.querySelector('.specialCondX');
            const condYLabel = row.querySelector('.specialCondYLabel');
            const condY = row.querySelector('.specialCondY');
            const condAxis = row.querySelector('.specialCondAxis');

            conditionSelect.addEventListener('change', () => {
                if (conditionSelect.value === 'Rank') {
                    condXLabel.textContent = 'Rank:';
                    condX.min = 0;
                    condYLabel.textContent = 'Axis:';
                    condY.style.display = 'none';
                    condAxis.style.display = 'block';
                } else {
                    condXLabel.textContent = 'Cond X:';
                    condX.min = '';
                    condYLabel.textContent = 'Cond Y:';
                    condY.style.display = 'block';
                    condAxis.style.display = 'none';
                }
            });
        }

        addAnotherConditionBtn.addEventListener('click', () => {
            const newRow = document.createElement('div');
            newRow.className = 'condition-row';
            newRow.style.display = 'grid';
            newRow.style.gridTemplateColumns = '2fr 1fr 1fr';
            newRow.style.gap = '5px';
            newRow.style.marginBottom = '10px';
            newRow.innerHTML = `
                <div>
                    <label style="font-size: 12px; margin-bottom: 2px;">Condition:</label>
                    <select class="specialCondition" style="width: 100%; padding: 6px; background: var(--piece-white); border: 1px solid var(--board-dark); border-radius: 4px; font-size: 13px; margin-bottom: 0;">
                        <option value="ifEmpty">ifEmpty</option>
                        <option value="Rank">Rank</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 12px; margin-bottom: 2px;" class="specialCondXLabel">Cond X:</label>
                    <input type="number" class="specialCondX" value="0" style="width: 100%; padding: 6px; font-size: 13px; margin-bottom: 0;">
                </div>
                <div>
                    <label style="font-size: 12px; margin-bottom: 2px;" class="specialCondYLabel">Cond Y:</label>
                    <input type="number" class="specialCondY" value="1" style="width: 100%; padding: 10px 6px; font-size: 13px; margin-bottom: 0;">
                    <select class="specialCondAxis" style="display: none; width: 100%; padding: 6px; font-size: 13px; margin-bottom: 0;">
                        <option value="Vertical">Vertical</option>
                        <option value="Horizontal">Horizontal</option>
                    </select>
                    <button class="remove-condition-btn" style="background: var(--threat); color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 5px; font-size: 10px; margin-top: 5px; width: 100%;">Remove</button>
                </div>
            `;
            
            conditionsContainer.appendChild(newRow);
            attachConditionRowListeners(newRow);
            
            newRow.querySelector('.remove-condition-btn').addEventListener('click', () => {
                newRow.remove();
            });
        });

        addSpecialMoveBtn.addEventListener("click", () => {
            const hook = specialHook.value;
            const effName = specialEffect.value;
            const effX = parseInt(specialEffX.value) || 0;
            const effY = parseInt(specialEffY.value) || 0;
            const effParam = effName === 'causeVictory' ? specialEffParamVictory.value.trim() : specialEffParam.value.trim();

            const conditionsList = [];
            const conditionRows = conditionsContainer.querySelectorAll('.condition-row');
            
            conditionRows.forEach(row => {
                const condName = row.querySelector('.specialCondition').value;
                const condX = parseInt(row.querySelector('.specialCondX').value) || 0;
                const condY = parseInt(row.querySelector('.specialCondY').value) || 0;
                const condAxis = row.querySelector('.specialCondAxis').value;

                let conditionSettings = {};
                if (condName === 'Rank') {
                    conditionSettings = { rank: condX, axis: condAxis };
                } else {
                    conditionSettings = { offsetX: condX, offsetY: condY };
                }
                
                conditionsList.push({
                    name: condName,
                    settings: conditionSettings
                });
            });

            const specialMove = {
                hook: hook,
                condition: conditionsList,
                effect: {
                    name: effName,
                    settings: { offsetX: effX, offsetY: effY, pieceType: effParam }
                }
            };

            customPieceSpecialMoves.push(specialMove);
            updateSpecialMovesList();
            
            // Reset conditions
            conditionsContainer.innerHTML = '';
        });

        function updateMovesList() {
            currentMovesList.innerHTML = "";
            const currentMovesLabel = document.getElementById("currentMovesLabel");
            if (customPieceMoves.length === 0) {
                currentMovesLabel.style.display = "none";
                currentMovesList.style.display = "none";
            } else {
                currentMovesLabel.style.display = "block";
                currentMovesList.style.display = "block";
            }
            customPieceMoves.forEach((move, index) => {
                const li = document.createElement("li");
                li.style.marginBottom = "5px";
                let text = `${move.type}: x=${move.x}, y=${move.y}`;
                if (move.type === "blockable") {
                    text += ` (repeat: ${move.repeat}${move.limit ? `, limit: ${move.limit}` : ''})`;
                }
                if (move.impotent) {
                    text += ` [Impotent]`;
                }
                li.textContent = text;
                
                const removeBtn = document.createElement("button");
                removeBtn.textContent = "X";
                removeBtn.style.padding = "2px 5px";
                removeBtn.style.marginLeft = "10px";
                removeBtn.style.background = "var(--threat)";
                removeBtn.style.color = "white";
                removeBtn.style.border = "none";
                removeBtn.style.cursor = "pointer";
                removeBtn.style.width = "auto";
                removeBtn.style.display = "inline";
                
                removeBtn.addEventListener("click", () => {
                    customPieceMoves.splice(index, 1);
                    updateMovesList();
                    updatePreviewBoard();
                });
                
                li.appendChild(removeBtn);
                currentMovesList.appendChild(li);
            });
        }

        function updateSpecialMovesList() {
            currentSpecialMovesList.innerHTML = "";
            const currentSpecialMovesLabel = document.getElementById("currentSpecialMovesLabel");
            if (customPieceSpecialMoves.length === 0) {
                currentSpecialMovesLabel.style.display = "none";
                currentSpecialMovesList.style.display = "none";
            } else {
                currentSpecialMovesLabel.style.display = "block";
                currentSpecialMovesList.style.display = "block";
            }
            customPieceSpecialMoves.forEach((sm, index) => {
                const li = document.createElement("li");
                li.style.marginBottom = "5px";
                
                const conditionStrings = sm.condition.map(cond => {
                    if (cond.name === 'Rank') {
                        return `Rank(${cond.settings.rank}, ${cond.settings.axis})`;
                    } else {
                        return `${cond.name}(${cond.settings.offsetX},${cond.settings.offsetY})`;
                    }
                });
                const conditionText = conditionStrings.length > 0 ? `if ${conditionStrings.join(' AND ')} -> ` : '';
                
                li.textContent = `${sm.hook}: ${conditionText}${sm.effect.name}(${sm.effect.settings.offsetX},${sm.effect.settings.offsetY},${sm.effect.settings.pieceType}) `;
                
                const removeBtn = document.createElement("button");
                removeBtn.textContent = "✖";
                removeBtn.style.background = "none";
                removeBtn.style.color = "red";
                removeBtn.style.border = "none";
                removeBtn.style.cursor = "pointer";
                removeBtn.style.width = "auto";
                removeBtn.style.display = "inline";
                
                removeBtn.addEventListener("click", () => {
                    customPieceSpecialMoves.splice(index, 1);
                    updateSpecialMovesList();
                });
                
                li.appendChild(removeBtn);
                currentSpecialMovesList.appendChild(li);
            });
        }

        function generatePreviewBoard() {
            previewBoard.innerHTML = "";
            previewBoard.style.display = "grid";
            previewBoard.style.gridTemplateColumns = `repeat(9, 1fr)`;
            previewBoard.style.gridTemplateRows = `repeat(9, 1fr)`;
            previewBoard.style.width = "540px"; // 9 * 60px
            previewBoard.style.height = "540px";
            
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const square = document.createElement("div");
                    square.classList.add("square");
                    square.classList.add((r + c) % 2 === 0 ? "white" : "black");
                    square.dataset.x = c;
                    square.dataset.y = r;
                    previewBoard.appendChild(square);
                    
                    // Allow clicking on squares to add moves quickly
                    square.addEventListener("click", () => {
                        const dx = c - 4;
                        const dy = r - 4;
                        if (dx === 0 && dy === 0) return;
                        
                        moveXInput.value = dx;
                        moveYInput.value = dy;
                    });
                }
            }
        }

        function updatePreviewBoard() {
            if (previewBoard.innerHTML === "") generatePreviewBoard();
            
            // Clear previous highlights and piece
            Array.from(previewBoard.children).forEach(square => {
                square.innerHTML = "";
                square.style.boxShadow = "";
                square.style.background = "";
                // Restore original color
                const r = parseInt(square.dataset.y);
                const c = parseInt(square.dataset.x);
                if ((r + c) % 2 === 0) {
                    square.classList.add("white");
                    square.classList.remove("black");
                } else {
                    square.classList.add("black");
                    square.classList.remove("white");
                }
            });
            
            // Place piece in center
            const centerSquare = previewBoard.children[4 * 9 + 4];
            if (selectedCustomImage) {
                const img = document.createElement("img");
                img.src = selectedCustomImage.src;
                img.alt = selectedCustomImage.alt;
                centerSquare.appendChild(img);
            }
            
            // Highlight moves
            customPieceMoves.forEach(move => {
                if (move.type === "absolute" || move.type === "takeMove") {
                    const targetX = 4 + move.x;
                    const targetY = 4 + move.y;
                    if (targetX >= 0 && targetX < 9 && targetY >= 0 && targetY < 9) {
                        const targetSquare = previewBoard.children[targetY * 9 + targetX];
                        targetSquare.style.background = move.type === "takeMove" ? "rgba(229, 62, 62, 0.5)" : "rgba(130, 151, 105, 0.5)";
                    }
                } else if (move.type === "blockable") {
                    let limit = move.limit || (move.repeat ? 9 : 1);
                    let currX = 4 + move.x;
                    let currY = 4 + move.y;
                    let step = 1;
                    
                    while (currX >= 0 && currX < 9 && currY >= 0 && currY < 9 && step <= limit) {
                        const targetSquare = previewBoard.children[currY * 9 + currX];
                        targetSquare.style.background = "rgba(130, 151, 105, 0.5)";
                        currX += move.x;
                        currY += move.y;
                        step++;
                        if (move.repeat === false) break;
                    }
                }
            });
        }

        createPieceModeBtn.addEventListener("click", () => {
            menu.style.display = "none";
            pieces.style.display = "none";
            createPiecePanel.style.display = "block";
            chessboard.style.display = "none";
            previewBoard.style.display = "grid";
            updatePreviewBoard();
        });

        editOldPieceBtn.addEventListener("click", () => {
            editModalPiecesContainer.innerHTML = "";
            if (customPieces.length === 0) {
                showAlert("No custom pieces created yet.");
                return;
            }
            
            customPieces.forEach(piece => {
                const wrapper = document.createElement("div");
                wrapper.classList.add("custom-piece-wrapper");
                
                const nameLabel = document.createElement("div");
                nameLabel.classList.add("custom-piece-name");
                nameLabel.textContent = piece.name;
                
                const img = document.createElement("img");
                img.src = '/static/white' + unitImages[piece.imageName];
                img.alt = piece.name;
                img.style.width = "100%";
                img.style.height = "auto";
                img.style.padding = "5px";
                
                wrapper.appendChild(nameLabel);
                wrapper.appendChild(img);
                
                wrapper.addEventListener("click", () => {
                    loadCustomPieceForEditing(piece);
                    editCustomPieceModal.style.display = "none";
                });
                
                editModalPiecesContainer.appendChild(wrapper);
            });
            
            editCustomPieceModal.style.display = "flex";
        });

        closeEditModalBtn.addEventListener("click", () => {
            editCustomPieceModal.style.display = "none";
        });
        
        // Also close when clicking outside the modal content
        editCustomPieceModal.addEventListener("click", (e) => {
            if (e.target === editCustomPieceModal) {
                editCustomPieceModal.style.display = "none";
            }
        });

        let editingCustomPieceId = null;

        function loadCustomPieceForEditing(piece) {
            editingCustomPieceId = piece.id;
            customPieceName.value = piece.name;
            customPieceValue.value = piece.value || 3;
            customPiecePosValue.value = piece.posValue || 2;
            
            // Select correct image
            const images = customImageContainer.querySelectorAll("img");
            images.forEach(img => {
                if (img.alt === piece.imageName) {
                    if (selectedCustomImage) selectedCustomImage.style.background = "";
                    selectedCustomImage = img;
                    selectedCustomImage.style.background = "var(--selected)";
                }
            });
            
            customPieceMoves = JSON.parse(JSON.stringify(piece.moves || []));
            customPieceSpecialMoves = JSON.parse(JSON.stringify(piece.specialMoves || []));
            
            updateMovesList();
            updateSpecialMovesList();
            updatePreviewBoard();
            
            saveCustomPieceBtn.textContent = "Update Custom Piece";
            cancelEditPieceBtn.style.display = "block";
            showAlert(`Loaded '${piece.name}' for editing.`);
        }

        cancelEditPieceBtn.addEventListener("click", () => {
            editingCustomPieceId = null;
            customPieceName.value = "";
            customPieceValue.value = "3";
            customPiecePosValue.value = "2";
            if (selectedCustomImage) {
                selectedCustomImage.style.background = "";
                selectedCustomImage = null;
            }
            customPieceMoves = [];
            customPieceSpecialMoves = [];
            updateMovesList();
            updateSpecialMovesList();
            updatePreviewBoard();
            saveCustomPieceBtn.textContent = "Save Custom Piece";
            cancelEditPieceBtn.style.display = "none";
        });

        saveCustomPieceBtn.addEventListener("click", () => {
            const name = customPieceName.value.trim();
            if (!name) {
                showAlert("Please enter a name for your custom piece");
                return;
            }
            if (!selectedCustomImage) {
                showAlert("Please select an image for your custom piece");
                return;
            }
            if (customPieceMoves.length === 0) {
                showAlert("Please add at least one move");
                return;
            }

            const customPiece = {
                name: name,
                value: parseInt(customPieceValue.value) || 3,
                posValue: parseInt(customPiecePosValue.value) || 2,
                imageName: selectedCustomImage.alt,
                moves: JSON.parse(JSON.stringify(customPieceMoves)),
                specialMoves: JSON.parse(JSON.stringify(customPieceSpecialMoves)),
                id: editingCustomPieceId ? editingCustomPieceId : "custom_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9)
            };

            if (editingCustomPieceId) {
                const index = customPieces.findIndex(p => p.id === editingCustomPieceId);
                if (index !== -1) {
                    customPieces[index] = customPiece;
                } else {
                    customPieces.push(customPiece);
                }
            } else {
                customPieces.push(customPiece);
            }

            saveCustomPiecesToDB();
            updateCustomPiecesMenu();
            
            // Reset form
            customPieceName.value = "";
            customPieceValue.value = "3";
            customPiecePosValue.value = "2";
            customPieceMoves = [];
            customPieceSpecialMoves = [];
            editingCustomPieceId = null;
            saveCustomPieceBtn.textContent = "Save Custom Piece";
            cancelEditPieceBtn.style.display = "none";
            if (selectedCustomImage) {
                selectedCustomImage.style.background = "";
                selectedCustomImage = null;
            }
            updateMovesList();
            updateSpecialMovesList();
            updatePreviewBoard();
            showAlert(`Custom piece '${name}' saved! It is now available in the Place Pieces menu.`);
        });

        // Event listeners for piece type toggle
        const showStandardPiecesBtn = document.getElementById("showStandardPieces");
        const showCustomPiecesBtn = document.getElementById("showCustomPieces");
        const pieceTypeToggleControls = document.getElementById("pieceTypeToggleControls");

        showStandardPiecesBtn.addEventListener("click", () => {
            showStandardPiecesBtn.classList.add("active-mode");
            showCustomPiecesBtn.classList.remove("active-mode");
            imageContainer.style.display = "grid";
            customPiecesContainer.style.display = "none";
        });

        showCustomPiecesBtn.addEventListener("click", () => {
            showCustomPiecesBtn.classList.add("active-mode");
            showStandardPiecesBtn.classList.remove("active-mode");
            imageContainer.style.display = "none";
            customPiecesContainer.style.display = "grid";
        });

        function updateCustomPiecesMenu(color = 'white') {
            if (customPieces.length > 0) {
                showCustomPiecesBtn.style.display = "inline-block";
            }
            customPiecesContainer.innerHTML = "";
            
            customPieces.forEach(piece => {
                const wrapper = document.createElement("div");
                wrapper.classList.add("custom-piece-wrapper");
                
                const nameLabel = document.createElement("div");
                nameLabel.classList.add("custom-piece-name");
                nameLabel.textContent = piece.name;
                
                const img = document.createElement("img");
                img.src = '/static/' + color + unitImages[piece.imageName];
                img.alt = piece.name;
                img.title = piece.name;
                img.dataset.customId = piece.id;
                
                const deleteBtn = document.createElement("button");
                deleteBtn.textContent = "🗑";
                deleteBtn.classList.add("custom-piece-delete");
                deleteBtn.title = "Delete this custom piece";
                deleteBtn.style.position = "absolute";
                deleteBtn.style.bottom = "-25px";
                deleteBtn.style.left = "50%";
                deleteBtn.style.transform = "translateX(-50%)";
                deleteBtn.style.background = "rgba(255, 0, 0, 0.2)";
                deleteBtn.style.border = "1px solid red";
                deleteBtn.style.color = "red";
                deleteBtn.style.cursor = "pointer";
                deleteBtn.style.fontSize = "12px";
                deleteBtn.style.padding = "2px 5px";
                deleteBtn.style.borderRadius = "3px";
                deleteBtn.style.zIndex = "10";
                
                deleteBtn.addEventListener("click", async (e) => {
                    e.stopPropagation(); // Prevent selecting the piece
                    if (await showConfirm(`Are you sure you want to delete '${piece.name}'?`)) {
                        const index = customPieces.findIndex(p => p.id === piece.id);
                        if (index !== -1) {
                            try {
                                const response = await fetch(`/api/custom-pieces/${piece.id}`, {
                                    method: 'DELETE',
                                    headers: Auth.getAuthHeaders()
                                });
                                
                                if (response.ok) {
                                    customPieces.splice(index, 1);
                                    if (selectedImage === img) {
                                        selectedImage = null;
                                    }
                                    updateCustomPiecesMenu(color);
                                } else {
                                    showAlert('Failed to delete custom piece from server.');
                                }
                            } catch (err) {
                                console.error("Error deleting custom piece", err);
                                showAlert('Error deleting custom piece.');
                            }
                        }
                    }
                });
                
                wrapper.style.position = "relative";
                wrapper.style.marginBottom = "25px"; // Make room for the button
                
                wrapper.appendChild(nameLabel);
                wrapper.appendChild(img);
                wrapper.appendChild(deleteBtn);
                
                wrapper.addEventListener("click", () => {
                    if (selectedImage == img) {
                        wrapper.classList.remove("selected");
                        selectedImage = null;
                    } else {
                        // Find previously selected wrapper if it exists and remove class
                        if (selectedImage) {
                            const prevWrapper = selectedImage.closest('.custom-piece-wrapper');
                            if (prevWrapper) prevWrapper.classList.remove("selected");
                            selectedImage.classList.remove("selected"); // Remove from standard image if any
                        }
                        selectedImage = img;
                        wrapper.classList.add("selected");
                    }
                });
                
                customPiecesContainer.appendChild(wrapper);
            });
        }
        
        // Initial display (show white images)
        generateImages("white");
        
        // Helper function to save custom pieces to the DB
        async function saveCustomPiecesToDB() {
            try {
                await fetch('/api/custom-pieces', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...Auth.getAuthHeaders()
                    },
                    body: JSON.stringify(customPieces)
                });
            } catch(e) {
                console.error("Error saving custom pieces to DB", e);
            }
        }

        // Load custom pieces from DB
        async function loadCustomPieces() {
            try {
                const res = await fetch('/api/custom-pieces', {
                    headers: { ...Auth.getAuthHeaders() }
                });
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data)) {
                        data.forEach(p => {
                            if (!p.id) p.id = "custom_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
                            if (!customPieces.find(existing => existing.id === p.id || (existing.name === p.name && !existing.id))) {
                                customPieces.push(p);
                            }
                        });
                        updateCustomPiecesMenu();
                    }
                }
                
                // MIGRATION: Check localStorage, if there are custom pieces, add them and save to DB
                const storedCustomPieces = localStorage.getItem('chessTwo_customPieces');
                if (storedCustomPieces) {
                    const parsed = JSON.parse(storedCustomPieces);
                    if (Array.isArray(parsed)) {
                        let migrated = false;
                        parsed.forEach(p => {
                            if (!p.id) p.id = "custom_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
                            if (!customPieces.find(existing => existing.id === p.id || (existing.name === p.name && !existing.id))) {
                                customPieces.push(p);
                                migrated = true;
                            }
                        });
                        if (migrated) {
                            await saveCustomPiecesToDB();
                        }
                        // Clear localStorage so migration doesn't run again
                        localStorage.removeItem('chessTwo_customPieces');
                        updateCustomPiecesMenu();
                    }
                }
            } catch(e) {
                console.error("Error loading custom pieces", e);
            }
        }
        
        loadCustomPieces();

        // Event listeners for color buttons
        showWhiteButton.addEventListener("click", () => { generateImages("white"); updateCustomPiecesMenu("white"); });
        showBlackButton.addEventListener("click", () => { generateImages("black"); updateCustomPiecesMenu("black"); });
        
        createBoardButton.addEventListener("click", () => {
            menu.style.display = "block";
            pieces.style.display = "none";
            createPiecePanel.style.display = "none";
            chessboard.style.display = "grid";
            previewBoard.style.display = "none";
            
            if(selectedImage) {
                selectedImage.classList.remove("selected");
                selectedImage = null;
            }
            addSquaresButton.classList.remove("active-mode");
            addSquaresButton.textContent = "Add Squares";
            removeSquaresButton.textContent = "Remove Squares";
            removeSquaresButton.classList.remove("active-mode");
        });
        
        placePiecesButton.addEventListener("click", () => {
            menu.style.display = "none";
            pieces.style.display = "flex";
            createPiecePanel.style.display = "none";
            chessboard.style.display = "grid";
            previewBoard.style.display = "none";
            
            addMode = false;
            removeMode = false;
            addSquaresButton.classList.remove("active-mode");
            removeSquaresButton.classList.remove("active-mode");
            addSquaresButton.textContent = "Add Squares";
            removeSquaresButton.textContent = "Remove Squares";
        });
    </script>
</body>
</html>
