<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess 2 - Replay</title>
    <script src="/src/loadImages.js"></script>
    <script src="/src/variables.js"></script>
    <script src="/src/jsonfn.js"></script>
    <script src="/moveMethods.js"></script>
    <script src="/pieceDefinitions.js"></script>
    <script src="/boardGeneration.js"></script>
    <script src="/src/globby.js"></script>
    <script src="/helperFunctions.js"></script>
    <link rel="stylesheet" href="/src/main.css">
    <style>
        body {
            background-color: #2e2e2e;
            color: #f0d9b5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        canvas {
            border: 5px solid #1a1a1a;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            background: #829769;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background: #6a7d55; }
        #status { font-size: 20px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="status">Loading Replay...</div>
    <canvas id="canvas" width="600" height="600"></canvas>
    <div class="controls">
        <button onclick="prevMove()">Previous</button>
        <button onclick="togglePlay()" id="playBtn">Play</button>
        <button onclick="nextMove()">Next</button>
    </div>
    <div id="moveInfo"></div>

    <script src="/replay.js"></script>
</body>
</html>
