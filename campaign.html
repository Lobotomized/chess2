<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess 2 - Campaign</title>
    <link rel="stylesheet" href="/src/main.css">
    <style>
        /* Chess-inspired variables */
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Quicksand:wght@500;700&display=swap');

:root {
    --board-light: #e4d8a5;
    --board-dark: #a67c52;
    --piece-white: #ffffff;
    --piece-black: #000000;
    --highlight: #7ea354;
    --threat: #cc5449;
    --selected: #f7e98e;
    --border-color: #000000;
    --bg-overlay: rgba(240, 230, 200, 0.95);
}

        body {
            background: url('/static/bigMap/plains1.png') center center / cover fixed;
            
            color: #000000; font-weight: bold; font-family: 'Quicksand', sans-serif; font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
                    font-size: 18px;
}

        /* Chess board pattern overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 25% 25%, rgba(0,0,0,0.1) 1px, transparent 1px),
                radial-gradient(circle at 75% 75%, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }

        /* Navigation - Chess piece inspired */
        nav {
            width: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            padding: 0;
            display: flex;
            flex-direction: column;
            border-bottom: 4px solid #4a382e;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            position: relative;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 12px 0;
            width: 100%;
        }
        
        .hamburger-menu {
            display: none;
            cursor: pointer;
            padding: 15px;
            align-self: flex-end;
        }
        
        .hamburger-menu span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: #ffffff;
            margin: 5px 0;
            transition: 0.4s;
        }
        
        nav a {
            color: #ffffff;
            text-shadow: none;
            text-decoration: none;
            margin: 0 10px;
            font-size: 26px;
            font-weight: bold;
            text-transform: uppercase;
            flex-shrink: 0;
            padding: 6px 12px;
            border: 2px solid transparent;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
        }
        nav a .icon { height: 32px; }
        nav a:hover {
            color: var(--selected);
            background: rgba(240, 217, 181, 0.1);
            border-color: var(--board-light);
            transform: translateY(2px);
            border-bottom-width: 4px;
        }
        nav a.active {
            color: var(--selected);
            background: rgba(247, 233, 142, 0.2);
            border-color: var(--selected);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        
        .icon {
    
    height: 64px;
    width: auto;
    vertical-align: middle;
    margin-right: 15px;
}

        .campaign {
            width: 90%;
            max-width: 800px;
            margin-top: 30px;
            background: var(--bg-overlay);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            padding: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        h2 .icon { height: 72px; margin-right: 15px; }
        h2 {
            font-family: 'Lilita One', cursive; font-weight: normal; letter-spacing: 1px;
            color: #ffffff;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 15px;
            font-size: 36px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            width: 100%;
            border-bottom: 2px solid var(--board-dark);
            padding-bottom: 10px;
        }

        .row-wrap {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            width: 100%;
            margin-bottom: 20px;
        }

        .campaign a {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #000000;
            text-decoration: none;
            margin: 5px;
            padding: 15px;
            border: 2px solid var(--border-color);
            background: rgba(255,255,255,0.5);
            border-radius: 12px;
            transition: all 0.3s ease;
            width: 80px;
        }
        .campaign a:hover {
            border-color: var(--highlight);
            transform: translateY(-3px);
            background: white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .campaign img {
            width: 50px;
            height: 50px;
            margin-top: 5px;
        }
        .campaign span {
            font-weight: bold;
            font-size: 26px;
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            html, body {
                min-width: 0;
                width: 100%;
                overflow-x: hidden;
                margin: 0;
                padding: 0;
            }
            
            body {
                background-size: 60px 60px;
            }
            
            nav {
                padding: 0;
                width: 100%;
                overflow: visible;
            }
            
            .hamburger-menu {
                display: block;
            }
            
            .nav-links {
                display: none;
                flex-direction: column;
                padding: 0;
            }
            
            .nav-links.active {
                display: flex;
            }
            
            nav a {
                font-size: 28px;
                margin: 0;
                padding: 15px;
                white-space: normal;
                width: 100%;
                box-sizing: border-box;
                border-top: 1px solid rgba(255,255,255,0.1);
                justify-content: flex-start;
            }
            
            nav::after {
                display: none;
            }
            
            .campaign {
                width: 92%;
                max-width: 92%;
                margin: 20px auto;
                padding: 15px;
                box-sizing: border-box;
                border-width: 4px;
            }
            
            .icon {
    
    height: 64px;
    width: auto;
    vertical-align: middle;
    margin-right: 15px;
}

            h2 .icon { height: 72px; margin-right: 15px; }
        h2 {
            font-family: 'Lilita One', cursive; font-weight: normal; letter-spacing: 1px;
                font-size: 28px;
                margin-top: 15px;
            }
            
            .row-wrap {
                gap: 10px;
            }

            .campaign a {
                width: 70px;
                padding: 10px;
                margin: 3px;
            }
            
            .campaign img {
                width: 40px;
                height: 40px;
            }
        }
        @media (max-width: 480px) {
            h2 { font-size: 24px; margin-bottom: 15px; }
            h2 .icon { height: 48px; margin-right: 10px; }
            .campaign { padding: 15px; }
            .row-wrap a { padding: 10px; gap: 5px; }
            .campaign img { width: 30px; height: 30px; }
            .row-wrap a span { font-size: 18px; }
        }
        @media (max-width: 360px) {
            h2 { font-size: 20px; margin-bottom: 10px; }
            h2 .icon { height: 36px; margin-right: 8px; }
            .campaign { padding: 10px; width: 95%; max-width: 95%; }
            .row-wrap a { padding: 8px; gap: 4px; }
            .campaign img { width: 24px; height: 24px; }
            .row-wrap a span { font-size: 16px; }
        }
    </style>
<script src="/src/modal.js?v=1"></script>
