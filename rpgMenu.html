<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess 2 - RPG Menu</title>
    <style>
        /* Chess-inspired variables */
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Quicksand:wght@500;700&display=swap');

        :root {
            --board-light: #e4d8a5;
            --board-dark: #a67c52;
            --piece-white: #ffffff;
            --piece-black: #000000;
            --highlight: #7ea354;
            --threat: #cc5449;
            --selected: #f7e98e;
            --border-color: #000000;
            --bg-overlay: rgba(240, 230, 200, 0.95);
        }

        body {
            background: url('/static/bigMap/forest2.png') center center / cover fixed;
            color: #000000; font-weight: bold; font-family: 'Quicksand', sans-serif; font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-size: 18px;
        }

        .menu-container {
            width: 90%;
            max-width: 500px;
            background: var(--bg-overlay);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
        }

        h1 .icon { height: 96px; margin-right: 20px; }
        h1 {
            font-family: 'Lilita One', cursive; font-weight: normal; letter-spacing: 1px;
            font-size: 4em;
            margin-top: 0;
            margin-bottom: 30px;
            color: #ffffff;
            -webkit-text-stroke: 2px #000000;
            text-shadow: 0px 4px 0px rgba(0,0,0,0.8), 0px 8px 10px rgba(0,0,0,0.4);
        }

        .menu-button .icon { height: 64px; margin-right: 20px; }
        .menu-button {
            font-family: 'Lilita One', cursive; font-weight: normal; letter-spacing: 1px;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to bottom, #7D5A4A, #4A332A); border-bottom: 6px solid #2d1b15; color: #ffffff;
            -webkit-text-stroke: 2px #000000;
            text-shadow: 0px 4px 0px rgba(0,0,0,0.8), 0px 8px 10px rgba(0,0,0,0.4);
            font-weight: bold;
            cursor: pointer;
            border: 2px solid var(--border-color);
            font-size: 36px;
            box-sizing: border-box;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .menu-button:hover {
            background: linear-gradient(to bottom, #8C6540, #5A3E2B); border-bottom: 6px solid #2d1b15;
            color: #ffffff;
            border-color: var(--selected);
            transform: translateY(2px);
            border-bottom-width: 4px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        
        .icon {
            height: 64px;
            width: auto;
            vertical-align: middle;
            margin-right: 15px;
        }
        
        .back-button {
            margin-top: 15px;
            font-size: 26px;
            background: linear-gradient(to bottom, #8C6540, #5A3E2B); border-bottom: 6px solid #2d1b15;
            padding: 15px;
        }

        .map-list-item {
            font-size: 28px;
            padding: 20px;
            justify-content: flex-start;
            text-align: left;
            text-transform: none;
        }
        .map-list-item .icon {
            height: 52px;
            margin-right: 15px;
        }

        .hide-scrollbar {
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.8em; margin-bottom: 20px; }
            h1 .icon { height: 56px; margin-right: 10px; }
            .menu-button { font-size: 22px; padding: 12px; }
            .menu-button .icon { height: 36px; margin-right: 10px; }
            .menu-container { padding: 20px; width: 92%; }
            .back-button { font-size: 20px; padding: 12px; }
            .map-list-item { font-size: 20px; padding: 12px; }
            .map-list-item .icon { height: 36px; }
        }
        @media (max-width: 360px) {
            h1 { font-size: 2em; }
            h1 .icon { height: 40px; }
            .menu-button { font-size: 16px; padding: 8px; }
            .menu-button .icon { height: 28px; }
            .menu-container { padding: 15px; width: 95%; gap: 12px; }
            .back-button { font-size: 16px; padding: 8px; }
            .map-list-item { font-size: 16px; padding: 8px; }
            .map-list-item .icon { height: 28px; }
        }
    </style>
    <script src="/src/modal.js?v=1"></script>
</head>
<body>
    <div class="menu-container" id="mainMenu">
        <h1><img src="/static/lg/whiteGeneral.png" class="icon"> RPG</h1>
        <button onclick="showLoadGames()" class="menu-button"><img src="/static/lg/whiteKing.png" class="icon"> Load Game</button>
        <button onclick="showNewGame()" class="menu-button"><img src="/static/lg/whiteShroom.png" class="icon"> New Game</button>
        
        <button id="authButton" onclick="handleAuthClick()" class="menu-button" style="font-size: 24px; padding: 15px; margin-top: 10px;">
            <img src="/static/lg/whiteKnight.png" class="icon" style="height: 48px;"> Login (To see your saves)
        </button>

        <a href="/single-player" class="menu-button back-button">Back</a>
    </div>

    <div class="menu-container" id="loadGamesMenu" style="display: none; max-width: 700px;">
        <h1>Load Game</h1>
        <div id="savesList" class="hide-scrollbar" style="display:flex; flex-direction:column; gap:15px; max-height:60vh; padding: 10px;"></div>
        <button onclick="showMainMenu()" class="menu-button back-button">Back</button>
    </div>

    <div class="menu-container" id="newGameMenu" style="display: none; max-width: 700px;">
        <h1>Select Map</h1>
        
        <label for="difficultySelect" style="color: white; font-size: 24px; -webkit-text-stroke: 1px black; margin-bottom: 5px; text-align: left; width: 100%;">Difficulty:</label>
        <select id="difficultySelect" style="font-size: 20px; padding: 10px; margin-bottom: 15px; border-radius: 8px; width: 100%; box-sizing: border-box; font-family: inherit;">
            <option value="easy">Easy (10 Gold, 100 Food)</option>
            <option value="normal" selected>Normal (100 Food)</option>
            <option value="hard">Hard (50 Food)</option>
            <option value="impossible">Impossible (100 Food, Permadeath)</option>
        </select>

        <label for="armyTypeSelect" style="color: white; font-size: 24px; -webkit-text-stroke: 1px black; margin-bottom: 5px; text-align: left; width: 100%;">Starting Army:</label>
        <select id="armyTypeSelect" style="font-size: 20px; padding: 10px; margin-bottom: 15px; border-radius: 8px; width: 100%; box-sizing: border-box; font-family: inherit;">
            <option value="mixed" >Mixed Army</option>
            <option selected value="classic">Classic Army</option>
        </select>
        
        <div id="mapsList" class="hide-scrollbar" style="display:flex; flex-direction:column; gap:15px; max-height:45vh; padding: 10px; width: 100%; box-sizing: border-box;"></div>
        <button onclick="showMainMenu()" class="menu-button back-button">Back</button>
    </div>

    <script src="/src/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateAuthButton();
        });

        function updateAuthButton() {
            const authBtn = document.getElementById('authButton');
            if (authBtn) {
                if (window.Auth && window.Auth.getToken()) {
                    authBtn.innerHTML = '<img src="/static/lg/blackKnight.png" class="icon" style="height: 48px;"> Logout';
                } else {
                    authBtn.innerHTML = '<img src="/static/lg/whiteKnight.png" class="icon" style="height: 48px;"> Login (To see your saves)';
                }
            }
        }

        function handleAuthClick() {
            if (window.Auth) {
                if (window.Auth.getToken()) {
                    window.Auth.clearToken();
                    window.location.reload();
                } else {
                    window.Auth.showAuthModal('login');
                }
            }
        }

        function showMainMenu() {
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById('loadGamesMenu').style.display = 'none';
            document.getElementById('newGameMenu').style.display = 'none';
        }
        
        async function showLoadGames() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('loadGamesMenu').style.display = 'flex';
            
            const savesList = document.getElementById('savesList');
            savesList.innerHTML = '<p style="color:white; font-size:24px; -webkit-text-stroke: 1px black;">Loading saves...</p>';
            
            let allSaves = [];
            
            // 1. Always load local saves
            const legacySave = localStorage.getItem('rpgState');
            if (legacySave) {
                try {
                    allSaves.push({ key: 'rpgState', slot: null, data: JSON.parse(legacySave), date: 0, isLocal: true });
                } catch(e) {}
            }
            
            let savedSlots = JSON.parse(localStorage.getItem('rpgSavesList') || '[]');
            savedSlots.forEach(slot => {
                const stateStr = localStorage.getItem(`rpgState_${slot}`);
                if (stateStr) {
                    try {
                        const parsed = JSON.parse(stateStr);
                        const ts = parseInt(slot.replace('save_', '')) || 0;
                        allSaves.push({ key: `rpgState_${slot}`, slot: slot, data: parsed, date: ts, isLocal: true });
                    } catch(e) {}
                }
            });
            
            // 2. If logged in, also load DB saves
            const token = window.Auth ? window.Auth.getToken() : null;
            if (token) {
                try {
                    const res = await fetch('/api/rpg-saves-list', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        if (data.saves) {
                            for (const s of data.saves) {
                                const saveRes = await fetch(`/api/rpg-save/${s.slotId}`, {
                                    headers: { 'Authorization': `Bearer ${token}` }
                                });
                                if (saveRes.ok) {
                                    const saveData = await saveRes.json();
                                    if (saveData.saveData) {
                                        allSaves.push({
                                            key: `db_${s.slotId}`,
                                            slot: s.slotId,
                                            data: saveData.saveData,
                                            date: new Date(s.updatedAt).getTime(),
                                            isLocal: false
                                        });
                                    }
                                }
                            }
                        }
                    }
                } catch (e) {
                    console.error("Failed to fetch DB saves", e);
                }
            }
            
            // Sort by date descending
            allSaves.sort((a, b) => b.date - a.date);
            
            savesList.innerHTML = '';
            
            if (allSaves.length > 0) {
                allSaves.forEach((save, index) => {
                    let level = save.data.level || '?';
                    let mapName = 'Random Map (Super Hard)';
                    if (save.data.grandMap && save.data.grandMap.predefinedMap) {
                        mapName = save.data.grandMap.predefinedMap;
                    }
                    
                    const dateStr = save.date ? new Date(save.date).toLocaleString() : 'Legacy Save';
                    const slotQuery = save.slot ? `&slot=${save.slot}` : '';
                    const sourceQuery = `&source=${save.isLocal ? 'local' : 'db'}`;
                    
                    const descText = save.isLocal 
                        ? `<div style="font-size:18px; font-weight:normal; color:white; margin-top:5px;">(Saved only locally and can be lost if local storage is cleared)</div>`
                        : `<div style="font-size:18px; font-weight:normal; color:white; margin-top:5px;">(Saved in DB and will be safe)</div>`;
                    
                    savesList.innerHTML += `
                        <div style="display:flex; gap:10px; align-items:center;">
                            <a href="/rpg.html?load=true${slotQuery}${sourceQuery}" class="menu-button map-list-item" style="flex:1;">
                                <img src="/static/lg/whiteKing.png" class="icon">
                                <div style="display:flex; flex-direction:column; justify-content:center;">
                                    <div>Save ${allSaves.length - index} (Level ${level}) - ${mapName}</div>
                                    <div style="font-size:18px; font-weight:normal; color:#ddd; margin-top:5px;">${dateStr}</div>
                                    ${descText}
                                </div>
                            </a>
                            <button onclick="deleteSave('${save.key}', '${save.slot || ''}')" class="menu-button" style="padding:10px; width:auto; background:linear-gradient(to bottom, #cc5449, #8b2218); border-color:#5c100a; font-size:24px; color:white; -webkit-text-stroke: 1px black;">
                                X
                            </button>
                        </div>
                    `;
                });
            } else {
                savesList.innerHTML = '<p style="color:white; font-size:24px; -webkit-text-stroke: 1px black;">No incomplete games found.</p>';
            }
        }
        
        window.deleteSave = async function(key, slot) {
            if(await showConfirm('Are you sure you want to delete this save?')) {
                if (key.startsWith('db_')) {
                    const token = window.Auth ? window.Auth.getToken() : null;
                    if (token && slot) {
                        try {
                            await fetch(`/api/rpg-save/${slot}`, {
                                method: 'DELETE',
                                headers: { 'Authorization': `Bearer ${token}` }
                            });
                        } catch (e) {
                            console.error("Failed to delete DB save", e);
                        }
                    }
                } else {
                    localStorage.removeItem(key);
                    if (slot) {
                        let savesList = JSON.parse(localStorage.getItem('rpgSavesList') || '[]');
                        savesList = savesList.filter(s => s !== slot);
                        localStorage.setItem('rpgSavesList', JSON.stringify(savesList));
                    }
                }
                showLoadGames(); // Refresh
            }
        }
        
        window.startNewMap = function(mapId) {
            const diff = document.getElementById('difficultySelect').value;
            const armyType = document.getElementById('armyTypeSelect').value;
            let url = '/rpg.html?new=true&difficulty=' + diff + '&armyType=' + armyType;
            if (mapId !== 'random') {
                url += '&customMapId=' + mapId;
            }
            window.location.href = url;
        }
        
        function showNewGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('newGameMenu').style.display = 'flex';
            
            const mapsList = document.getElementById('mapsList');
            mapsList.innerHTML = '<p style="color:white; font-size:24px; -webkit-text-stroke: 1px black;">Loading maps...</p>';
            
            let randomMapHtml = `
                <button onclick="startNewMap('random')" class="menu-button map-list-item">
                    <img src="/static/lg/whitePawn.png" class="icon">
                    Random Map
                </button>
            `;
            
            const headers = window.Auth && window.Auth.getToken() ? window.Auth.getAuthHeaders() : {};
            
            fetch('/maps?pageSize=100', {
                headers: headers
            })
            .then(res => res.ok ? res.json() : [])
            .then(data => {
                const maps = data.maps || data;
                mapsList.innerHTML = '';
                
                if (Array.isArray(maps)) {
                    maps.forEach(map => {
                        if (map.isGrandMap) {
                            mapsList.innerHTML += `
                                <button onclick="startNewMap('${map._id}')" class="menu-button map-list-item">
                                    <img src="/static/lg/whitePawn.png" class="icon">
                                    ${map.name}
                                </button>
                            `;
                        }
                    });
                }
                mapsList.innerHTML += randomMapHtml;
            })
            .catch(err => {
                console.error("Error loading custom maps:", err);
                mapsList.innerHTML = '<p style="color:white; font-size:20px; -webkit-text-stroke: 1px black;">Failed to load custom maps.</p>' + randomMapHtml;
            });
        }
    </script>
</body>
</html>
