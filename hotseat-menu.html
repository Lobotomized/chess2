<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess 2 - Hotseat</title>
    <link rel="stylesheet" href="/src/main.css">
    <style>
        /* Chess-inspired variables */
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Quicksand:wght@500;700&display=swap');

:root {
    --board-light: #e4d8a5;
    --board-dark: #a67c52;
    --piece-white: #ffffff;
    --piece-black: #000000;
    --highlight: #7ea354;
    --threat: #cc5449;
    --selected: #f7e98e;
    --border-color: #000000;
    --bg-overlay: rgba(240, 230, 200, 0.95);
}

        body {
            background: url('/static/bigMap/desert2.png') center center / cover fixed;
            
            color: #000000; font-weight: bold; font-family: 'Quicksand', sans-serif; font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
                    font-size: 18px;
}

        /* Chess board pattern overlay */
        

        /* Navigation - Chess piece inspired */
        nav {
            width: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            padding: 0;
            display: flex;
            flex-direction: column;
            border-bottom: 4px solid #4a382e;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            position: relative;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 12px 0;
            width: 100%;
        }
        
        .hamburger-menu {
            display: none;
            cursor: pointer;
            padding: 15px;
            align-self: flex-end;
        }
        
        .hamburger-menu span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: #ffffff;
            margin: 5px 0;
            transition: 0.4s;
        }
        
        nav a {
            color: #ffffff;
            text-shadow: none;
            text-decoration: none;
            margin: 0 10px;
            font-size: 26px;
            font-weight: bold;
            text-transform: uppercase;
            flex-shrink: 0;
            padding: 6px 12px;
            border: 2px solid transparent;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
        }
        nav a .icon { height: 32px; }
        nav a:hover {
            color: var(--selected);
            background: rgba(240, 217, 181, 0.1);
            border-color: var(--board-light);
            transform: translateY(2px);
            border-bottom-width: 4px;
        }
        nav a.active {
            color: var(--selected);
            background: rgba(247, 233, 142, 0.2);
            border-color: var(--selected);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        
        .icon {
    
    height: 64px;
    width: auto;
    vertical-align: middle;
    margin-right: 15px;
}

        .hotseat {
            width: 90%;
            max-width: 800px;
            margin-top: 30px;
            background: var(--bg-overlay);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            padding: 30px;
            position: relative;
        }

        h1 .icon { height: 96px; margin-right: 20px; }
        h1 {
            font-family: 'Lilita One', cursive; font-weight: normal; letter-spacing: 1px;
            color: #ffffff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 36px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }

        .row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            background: linear-gradient(to bottom, #8C6540, #5A3E2B); border-bottom: 6px solid #2d1b15;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .racePickImage {  
            width: 60px;
            height: 60px;
            cursor: pointer;
            border: 3px solid transparent;
            border-radius: 12px;
            padding: 5px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.5);
        }
        .racePickImage:hover {
            border-color: var(--highlight);
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.8);
        }
        .racePickImageSelectedWhite {
            border-color: var(--threat);
            background-color: rgba(229, 62, 62, 0.2);
            transform: scale(1.1);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .racePickImageSelectedBlack {
            border-color: var(--threat);
            background-color: rgba(229, 62, 62, 0.2);
            transform: scale(1.1);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .startGame .icon { height: 40px; margin-right: 10px; }
        .startGame {
            font-family: 'Lilita One', cursive; font-weight: normal; letter-spacing: 1px;
            width: 100%;
            padding: 15px;
            background: linear-gradient(to bottom, #7D5A4A, #4A332A); border-bottom: 6px solid #2d1b15; color: #ffffff;
            -webkit-text-stroke: 2px #000000;
            text-shadow: 0px 4px 0px rgba(0,0,0,0.8), 0px 8px 10px rgba(0,0,0,0.4);
            font-weight: bold;
            cursor: pointer;
            border: 2px solid var(--border-color);
            font-size: 26px;
            box-sizing: border-box;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            margin-top: 20px;
        }
        
        .startGame:hover {
            background: linear-gradient(to bottom, #8C6540, #5A3E2B); border-bottom: 6px solid #2d1b15;
            color: #ffffff;
            border-color: var(--selected);
            transform: translateY(2px);
            border-bottom-width: 4px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        select {
            padding: 12px;
            background: #f0f0f0;
            border: 2px solid var(--border-color);
            color: #000000; font-weight: bold; font-family: 'Quicksand', sans-serif; font-weight: 700;
            font-size: 28px;
            box-sizing: border-box;
            border-radius: 12px;
            transition: all 0.3s ease;
            min-width: 200px;
        }
        select:focus {
            outline: none;
            border-color: var(--highlight);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .movesFirstRow {
            margin-top: 10px;
        }

        label {
            color: #000000;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 26px;
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            body {
                overflow-x: hidden;
            }
            
            nav {
                padding: 0;
                width: 100%;
                overflow: visible;
            }
            
            .hamburger-menu {
                display: block;
            }
            
            .nav-links {
                display: none;
                flex-direction: column;
                padding: 0;
            }
            
            .nav-links.active {
                display: flex;
            }
            
            nav a {
                font-size: 28px;
                margin: 0;
                padding: 15px;
                white-space: normal;
                width: 100%;
                box-sizing: border-box;
                border-top: 1px solid rgba(255,255,255,0.1);
                justify-content: flex-start;
            }
            
            nav::after {
                display: none;
            }
            
            .hotseat {
                width: 92%;
                max-width: 92%;
                margin: 20px auto;
                padding: 15px;
                border-width: 4px;
                box-sizing: border-box;
            }
            
            .row {
                width: 100%;
                box-sizing: border-box;
                padding: 10px;
                gap: 10px;
            }
            
            .racePickImage {  
                width: 45px;
                height: 45px;
                padding: 2px;
            }
            
            select {
                width: 100%;
                min-width: unset;
                font-size: 28px; /* Prevents zoom on iOS */
                padding: 10px;
            }
            
            h1 .icon { height: 96px; margin-right: 20px; }
        h1 {
            font-family: 'Lilita One', cursive; font-weight: normal; letter-spacing: 1px;
                font-size: 28px;
                margin-bottom: 15px;
            }

            /* Stack controls vertically on very small screens */
            .movesFirstRow {
                flex-direction: column;
                align-items: stretch;
            }
            .movesFirstRow label {
                margin-right: 0;
                margin-bottom: 5px;
                text-align: center;
            }
            
            /* Better touch targets for mobile */
            .startGame .icon { height: 40px; margin-right: 10px; }
        .startGame {
            font-family: 'Lilita One', cursive; font-weight: normal; letter-spacing: 1px;
                padding: 15px;
                font-size: 26px;
            }
        }
        @media (max-width: 480px) {
            h1 { font-size: 24px; }
            h1 .icon { height: 48px; margin-right: 10px; }
            .hotseat { padding: 15px; }
            .row { padding: 10px; gap: 8px; margin-bottom: 15px; }
            .racePickImage { width: 36px; height: 36px; padding: 2px; }
            select { font-size: 20px; padding: 8px; }
            label { font-size: 20px; }
            .startGame { font-size: 20px; padding: 12px; }
            .startGame .icon { height: 32px; margin-right: 8px; }
        }
        @media (max-width: 360px) {
            h1 { font-size: 20px; }
            h1 .icon { height: 36px; margin-right: 8px; }
            .hotseat { padding: 10px; width: 95%; max-width: 95%; }
            .row { padding: 8px; gap: 6px; }
            .racePickImage { width: 30px; height: 30px; padding: 1px; }
            select { font-size: 16px; padding: 6px; }
            label { font-size: 16px; }
            .startGame { font-size: 16px; padding: 10px; }
            .startGame .icon { height: 24px; margin-right: 6px; }
        }
    </style>
    <script>
        let raceWhite = 'classic';
        let raceBlack = 'classic';
        const cleanSelect = function(selected,removedClass, race){
            var elems = document.querySelectorAll("."+removedClass);
            [].forEach.call(elems, function(el) {
                el.classList.remove(removedClass);
            });
            selected.classList.add(removedClass)

            if(removedClass === 'racePickImageSelectedWhite'){
                raceWhite = race;
            }
            else{
                raceBlack = race;
            }
        }

        const hotseatGameStart = function(){
            let ifWhiteAI = document.querySelector('#whitePlayerSelect').value
            let ifBlackAI = document.querySelector('#blackPlayerSelect').value;

            let whoStartsFirst = document.querySelector('#whoStartsFirst').value;

            let ifAllAI =  ifWhiteAI != '' && ifBlackAI != '';

            let gameType = document.querySelector('#gameType')?.value;
            gameType = gameType ? `&gameType=${gameType}` : ''
            let aiColor = '&AIColor=';
            let aiPower = ''

            let startMoveString = `&starts=${whoStartsFirst}`

            

            if(ifAllAI){
                aiColor+='all'
                aiPower += `&AIPowerWhite=${ifWhiteAI}&AIPowerBlack=${ifBlackAI}`
            }
            else if(ifWhiteAI){
                aiColor += 'white'
                aiPower += `&AIPowerWhite=${ifWhiteAI}`
            }
            else if(ifBlackAI){
                aiColor += 'black'
                aiPower += `&AIPowerBlack=${ifBlackAI}`
            }


            
            window.location.href = `/hotseat?whiteRace=${raceWhite}&blackRace=${raceBlack}${aiColor}${gameType}${aiPower}${startMoveString}`
        }
    </script>
<script src="/src/modal.js?v=1"></script>
    </head>
<body>
    <div id="loadingScreen">
        <div class="spinner"></div>
        Loading Assets...
    </div>
    <script>
        window.addEventListener('load', function() {
            const screen = document.getElementById('loadingScreen');
            if(screen) screen.style.display = 'none';
        });
    </script>
    <nav>
        <div class="hamburger-menu" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="/"><img src="/static/lg/whitePawn.png" class="icon"> Main Menu</a>
            <a href="/single-player"><img src="/static/lg/whiteRicar.png" class="icon"> Back</a>
        </div>
    </nav>
    <script src="/src/auth.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }
    </script>

    <div class="hotseat">
        <h1><img src="/static/lg/whiteKing.png" class="icon"> Pick White Race</h1>
        <div class="row">
            <img class="racePickImage" onclick="cleanSelect(this, 'racePickImageSelectedWhite', 'medieval')" src="/static/lg/whiteClown.png" alt="">
            <img class="racePickImage" onclick="cleanSelect(this, 'racePickImageSelectedWhite', 'bug')" src="/static/lg/whiteAnt.png" alt="">
            <img class="racePickImage" onclick="cleanSelect(this, 'racePickImageSelectedWhite', 'classic')" src="/static/lg/whiteKing.png" alt="">
            <img class="racePickImage" onclick="cleanSelect(this, 'racePickImageSelectedWhite', 'cyborgs')" src="/static/lg/whiteCrystal.png" alt="">
            <img class="racePickImage" onclick="cleanSelect(this, 'racePickImageSelectedWhite', 'promoters')" src="/static/lg/whiteNorthernKing.png" alt="">
            <select name="" id="whitePlayerSelect">
                <option value="">Human Player</option>
                <option value="101">AI</option>
            </select>
        </div>

        <h1><img src="/static/lg/blackKing.png" class="icon"> Pick Black Race</h1>
        <div class="row">
            <img class="racePickImage" onclick="cleanSelect(this, 'racePickImageSelectedBlack', 'medieval')" src="/static/lg/blackClown.png" alt="">
            <img class="racePickImage" onclick="cleanSelect(this, 'racePickImageSelectedBlack', 'bug')" src="/static/lg/blackAnt.png" alt="">
            <img class="racePickImage" onclick="cleanSelect(this, 'racePickImageSelectedBlack', 'classic')" src="/static/lg/blackKing.png" alt="">
            <img class="racePickImage" onclick="cleanSelect(this, 'racePickImageSelectedBlack', 'cyborgs')" src="/static/lg/blackCrystal.png" alt="">
            <img class="racePickImage" onclick="cleanSelect(this, 'racePickImageSelectedBlack', 'promoters')" src="/static/lg/blackNorthernKing.png" alt="">
            <select  name="" id="blackPlayerSelect">
                <option value="">Human Player</option>
                <option value="101">AI</option>
            </select>
        </div>

        <div class="row movesFirstRow">
            <label style="margin-right: 10px;">Who Moves First:</label>
            <select id="whoStartsFirst">
                <option value="whiteStarts">White Moves First</option>
                <option value="blackStarts">Black Moves First</option>
            </select>
        </div>

        <div class="row" style="flex-direction: column; margin-top: 30px;">
            <label for="gameType" style="font-size: 28px;"><img src="/static/lg/whiteQueen.png" class="icon"> Mode</label>
            <select name="" id="gameType" style="width: 100%;">
                <option value="raceChoiceChess">Chess 2</option>
                <option value="classicChess">Chess 1</option>
                <option value="miniChess">Minichess</option>
                <option value="morphingRaceChoiceChess">Morphing Chess 2</option>
                <option value="mongolianChess">Mongolian Chess</option>
                <option value="randomChess">Random Chess</option>
                <option value="hugeRandomChess">9 x 9 Random Chess</option>
                <option value="grandRandomChess">11 x 11 random Chess</option>
            </select>
            <a class="startGame column" onclick="hotseatGameStart()"><img src="/static/lg/whiteKing.png" class="icon"> Start Game <img src="/static/lg/blackKing.png" class="icon"></a> 
        </div>

    </div>
</body>
</html>
