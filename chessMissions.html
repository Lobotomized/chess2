<script>
    let squareLength = screen.width < screen.height? parseInt(screen.width/8) : parseInt(screen.height/12) 
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const exitButton = document.getElementById('exitButton')
    const flagImage = document.getElementById('flagImage')
    const socket = io();
    let mouseX;
    let mouseY;
    let st = undefined;
    let endGame = false;
    let IAM;
    let boardheight;
    let boardWidth;
    let state;
    let hoveredPiece;
    let playerRef;

    let localBot = null;
    let localState = null;
    let w = null;
    let localGameId = null;

    function saveLocalState() {
        if (!localState || !localGameId) return;
        try {
            const data = {
                timestamp: Date.now(),
                state: localState,
                bot: localBot
            };
            localStorage.setItem('saved_match_game_' + localGameId, JSONfn.stringify(data));
        } catch (e) {
            console.error("Failed to save local state:", e);
        }
    }

    function setupLocalBotGame(bot, roomId) {
        localBot = bot;
        localGameId = roomId;
        
        // Try to restore saved game
        let restored = false;
        try {
            const savedStr = localStorage.getItem('saved_match_game_' + roomId);
            if (savedStr) {
                const saved = JSONfn.parse(savedStr);
                const age = Date.now() - saved.timestamp;
                if (age < 10000) { // 10 seconds
                    localState = saved.state;
                    localBot = saved.bot;
                    restored = true;
                    console.log("Restored game state from", age, "ms ago");
                } else {
                    localStorage.removeItem('saved_match_game_' + roomId);
                }
            }
        } catch(e) {
            console.error("Failed to parse saved state", e);
        }

        if (!restored) {
            localState = {
                gameType: 'raceChoiceChess',
                board: [],
                pieces: [],
                turn: 'menu',
                whiteClock: 6000,
                blackClock: 6000,
                whiteRace: undefined,
                blackRace: bot.race || 'classic'
            };
            
            for (let x = 0; x <= 7; x++) {
                for (let y = 0; y <= 7; y++) {
                    localState.board.push({ light: false, x: x, y: y })
                }
            }
            localState.pieces.push(kingFactory('white',1,1), hatFactory('white',1,2), shroomFactory('white', 1, 3), northernKing('white',1,4), empoweredCrystalFactory('white',1,5));
        }
        
        IAM = 'white';
        playerRef = 'player1';
        
        let lastTime = Date.now();
        let timeAccumulator = 0;
        setInterval(() => {
            if (localState && localState.turn !== 'menu' && !localState.won) {
                const now = Date.now();
                timeAccumulator += (now - lastTime);
                lastTime = now;
                
                const ticks = Math.floor(timeAccumulator / 100);
                if (ticks > 0) {
                    timeAccumulator -= ticks * 100;
                    
                    if (localState.turn === 'white') localState.whiteClock -= ticks;
                    else localState.blackClock -= ticks;
                    
                    if (localState.whiteClock <= 0) localState.won = 'black';
                    if (localState.blackClock <= 0) localState.won = 'white';
                    
                    // Also visually update clocks if it's currently a local game
                    const me = document.getElementById('blackClock');
                    const enemy = document.getElementById('whiteClock');
                    
                    if (me && enemy) {
                        me.innerText = 'My time ' + localState.whiteClock;
                        enemy.innerText = 'Enemy time ' + localState.blackClock;
                    }
                }
            } else {
                lastTime = Date.now();
                timeAccumulator = 0;
            }
        }, 100);

        // Periodically save state (every second)
        setInterval(saveLocalState, 1000);
        
        // Ping server to check internet connection
        let lastSuccessfulPing = Date.now();
        setInterval(() => {
            if (localState && !localState.won) {
                fetch('/ping', { method: 'GET', cache: 'no-store' })
                    .then(res => {
                        if (res.ok) lastSuccessfulPing = Date.now();
                    })
                    .catch(() => {
                        // Request failed (likely network drop)
                    });
                
                // If 10 seconds have passed without a successful ping, drop the game
                if (Date.now() - lastSuccessfulPing > 10000) {
                    console.log("Connection lost for 10 seconds. Dropping local game.");
                    localState.won = 'black'; // Forfeit by disconnection
                    updateLocalState();
                    setTimeout(() => {
                        window.location.replace('/');
                    }, 2000);
                }
            }
        }, 2000);

        // Save immediately on window unload
        window.addEventListener('beforeunload', saveLocalState);

        updateLocalState();
        
        // If restored and it's black's turn, resume AI
        if (restored && localState.turn === 'black' && !localState.won) {
            triggerBotMove();
        }
    }

    function updateLocalState() {
        state = localState;
        state.yourTurn = (state.turn === 'white' || state.turn === 'menu');
        
        const myTurnH1 = document.getElementById('turn');
        myTurnH1.style.color = whiteSquareColor;
        canvas.width = squareLength * 8 + squareLength;
        canvas.height = squareLength * 8 + squareLength;
        
        if (state.turn === 'menu') {
            myTurnH1.innerText = "Select your race by moving the white piece";
            // Highlight options - removed bot's race highlighting so it remains hidden
        } else {
            myTurnH1.innerText = '';
        }
        
        // Show exit button
        if(exitButton.hasAttribute('style')){
            exitButton.removeAttribute('style');
        }
        
        boardWidth = 7;
        boardHeight = 7;
        
        if (!window.drawLoopStarted) {
            window.drawLoopStarted = true;
            requestAnimationFrame(drawLoop);
        }
    }

    function handleLocalMove(x, y) {
        const move = {x, y};
        const st = localState;
        
        if (st.turn === 'menu') {
            if (move.x === 1 && move.y === 1) st.whiteRace = 'classic';
            else if (move.x === 1 && move.y === 2) st.whiteRace = 'medieval';
            else if (move.x === 1 && move.y === 3) st.whiteRace = 'bug';
            else if (move.x === 1 && move.y === 4) st.whiteRace = 'promoters';
            else if (move.x === 1 && move.y === 5) st.whiteRace = 'cyborgs';
            
            if (st.whiteRace && st.blackRace) {
                st.turn = 'white';
                raceChoiceChess(st, st.whiteRace, st.blackRace);
            }
            updateLocalState();
            return;
        }
        
        if (st.turn !== 'white') return;
        
        if (st.pieceSelected) {
            if (playerMove(move, st)) {
                if(st.specialOnMoveEffects && st.specialOnMoveEffects.length){
                    st.specialOnMoveEffects.forEach((winCondition) => { winCondition(st); });
                }
                changeTurn(st);
                if(!st.won && checkRemi(st)){
                    st.won = 'tie';
                    if(st.specialOnDrawEffects){
                        st.specialOnDrawEffects.forEach((effect) => { effect(st); });
                    }
                } else if (!st.won) {
                    for (let i = st.pieces.length - 1; i >= 0; i--) {
                        if(st.pieces[i].color == st.turn){
                            if (st.pieces[i].afterEnemyPlayerMove) {
                                st.pieces[i].afterEnemyPlayerMove(st, playerMove)
                            }
                        }
                    }
                }
                saveLocalState();
                updateLocalState();
                
                if (!st.won && st.turn === 'black') {
                    triggerBotMove();
                }
            } else {
                closeLights(st.board);
                st.pieceSelected = undefined;
                updateLocalState();
            }
        } else {
            selectPiece(move, st);
            if (st.pieceSelected) {
                lightBoardFE(st.pieceSelected, st);
            }
            updateLocalState();
        }
    }

    function triggerBotMove() {
        if (!w) {
            w = new Worker("src/webworker.js");
        }
        
        localState.pieces = localState.pieces.sort((a, b) => 0.5 - Math.random());
        
        w.postMessage(JSONfn.stringify({
            state: localState,
            color: 'black',
            AIPower: 'customEvolution',
            customEvolutionWhite: undefined,
            customEvolutionBlack: JSON.stringify(localBot)
        }));
        
        w.onmessage = function(event) {
            let move = JSONfn.parse(event.data);
            
            const myPieces = getColorPieces(localState.pieces, 'black');
            selectPiece({x: myPieces[move.pieceCounter].x, y: myPieces[move.pieceCounter].y}, localState);
            lightBoardFE(localState.pieceSelected, {pieces: localState.pieces, board: localState.board, turn: localState.turn});
            
            if (playerMove({x: move.xClicked, y: move.yClicked}, localState)) {
                if(localState.specialOnMoveEffects && localState.specialOnMoveEffects.length){
                    localState.specialOnMoveEffects.forEach((winCondition) => { winCondition(localState); });
                }
                changeTurn(localState);
                if(!localState.won && checkRemi(localState)){
                    localState.won = 'tie';
                    if(localState.specialOnDrawEffects){
                        localState.specialOnDrawEffects.forEach((effect) => { effect(localState); });
                    }
                } else if (!localState.won) {
                    for (let i = localState.pieces.length - 1; i >= 0; i--) {
                        if(localState.pieces[i].color == localState.turn){
                            if (localState.pieces[i].afterEnemyPlayerMove) {
                                localState.pieces[i].afterEnemyPlayerMove(localState, playerMove)
                            }
                        }
                    }
                }
            } else {
                closeLights(localState.board);
                localState.pieceSelected = undefined;
            }
            
            saveLocalState();
            updateLocalState();
            
            if (!localState.won && localState.turn === 'black') {
                setTimeout(triggerBotMove, 100);
            }
        };
    }

    exitButton.addEventListener('click', function(){
        if (localState) {
            localState.won = 'black'; // Forfeit means you lose
            updateLocalState();
            setTimeout(() => {
                window.location.replace('/');
            }, 2000);
            return;
        }
        socket.emit('exit');
        window.location.replace('/')
    })
    socket.on('rooms', (data) => {
    })
    let lastState = null;

    socket.on('returnState', async (secretState) => {
        if (document.readyState !== 'complete') {
             await new Promise(resolve => window.addEventListener('load', resolve));
        }
        if (window.imagesLoaded) {
            await window.imagesLoaded;
        }
        
        // Preserve animation state from previous state
        if (lastState && lastState.pieces) {
             secretState.pieces.forEach(newP => {
                 // Match piece by position and type
                 const oldP = lastState.pieces.find(p => p.x === newP.x && p.y === newP.y && p.icon === newP.icon);
                 if (oldP && oldP.animX !== undefined) {
                     newP.animX = oldP.animX;
                     newP.animY = oldP.animY;
                 }
             });
        }
        
        //Draw the game

        const myTurnH1 = document.getElementById('turn');
        myTurnH1.style.color = whiteSquareColor;
        canvas.width = squareLength * boardWidth + squareLength;
        canvas.height = squareLength * boardWidth + squareLength;
        state = secretState;

        // Initialize animation for moving piece
        if (state.oldMove) {
             const isSameMove = lastState && lastState.oldMove &&
                                lastState.oldMove.oldX === state.oldMove.oldX && 
                                lastState.oldMove.oldY === state.oldMove.oldY && 
                                lastState.oldMove.currentX === state.oldMove.currentX && 
                                lastState.oldMove.currentY === state.oldMove.currentY;
             
             if (!isSameMove) {
                 // Find piece that moved
                 const movedPiece = state.pieces.find(p => p.x === state.oldMove.currentX && p.y === state.oldMove.currentY);
                 
                 if (movedPiece) {
                      movedPiece.animX = state.oldMove.oldX;
                      movedPiece.animY = state.oldMove.oldY;
                 }
             }
        }
        
        lastState = state;

        if(state.modalMessages && !modalAdded){
            buildModal(state, state.modalMessages, modal);
        }
        if(state.pieceModalMessages && typeof buildPieceModal !== 'undefined' && !pieceModalAdded){
            buildPieceModal(state, state.pieceModalMessages, pieceModal);
        }
        modalAdded = true;
        pieceModalAdded = true;
        if(hoveredPiece){
            if(hoveredPiece.color != IAM && IAM != undefined){
                lightBoardFE(hoveredPiece,state,'red','grey')
            }
        }
        if (state.pieces && state.board) {
            if(exitButton.hasAttribute('style')){
                exitButton.removeAttribute('style')
            }

            //Draw Squares
            const me = document.getElementById('blackClock');
            const enemy = document.getElementById('whiteClock');
            const body = document.getElementsByTagName('body')[0];
            const forfeitTextButton = document.getElementById('forfeitText');
            me.innerText = 'My Time ' +state.blackClock;
            
            enemy.innerText = 'Enemy Time ' +state.whiteClock
            if (state.turn == 'black') {
                body.style.background = blackSquareColor
                me.style.color = whiteSquareColor;
                enemy.style.color = whiteSquareColor;
            }
            else {
                me.style.color = blackSquareColor;
                enemy.style.color = blackSquareColor;
                body.style.background = whiteSquareColor
            }
            myTurnH1.innerText = state.message || '';
            const height = getMaxX(state.board,'y')
            if(state.playerRef !== undefined){
                playerRef = state.playerRef
            }
            if(state.turn != 'menu' ){
                if(playerRef != 'player1' && playerRef !='player2'){
                    IAM = 'white'
                }
                else if(!state.won){
                    if(state.turn == 'white' && state.yourTurn || state.turn == 'black' && !state.yourTurn){
                        IAM = 'white'
                        me.innerText = 'My time '+state.whiteClock;
                        enemy.innerText = 'Enemy time '+state.blackClock;
                    }
                    else{
                        IAM = 'black'
                    }
                }
            }
            boardWidth  = state.board.reduce((accumulator, currentValue) => {
                if(accumulator > currentValue.x){
                    return accumulator
                }
                else{
                    return currentValue.x
                }
            })
            boardHeight  = state.board.reduce((accumulator, currentValue) => {
                if(accumulator > currentValue.y){
                    return accumulator
                }
                else{
                    return currentValue.y
                }
            })
            state.board.forEach((sq,index) => {
                let y = sq.y;
                let x = sq.x;
                if(IAM == 'black'){
                    y = reverseNumber(y,boardHeight);
                }

                let orderFirst = true;
                if(y%2 != 0){
                    orderFirst = false;
                }
                if (!sq.light && !sq.special) {
                        if(IAM == 'white'){
                            if(orderFirst){
                                if(x % 2 != 0){
                                    drawBlackSquare(x * squareLength, y * squareLength, squareLength)
                                }
                                else{
                                    drawWhiteSquare(x * squareLength, y * squareLength, squareLength)
                                }
                            }
                            else{
                                if(x % 2 != 0){
                                    drawWhiteSquare(x * squareLength, y * squareLength, squareLength)
                                }
                                else{
                                    drawBlackSquare(x * squareLength, y * squareLength, squareLength)
                                }
                            }
                            if(state.pieceSelected){
                                if(x == state.pieceSelected.x && y == state.pieceSelected.y){
                                    drawColoredSquare(x*squareLength, y*squareLength,availableSquareColor, squareLength)
                                }
                            }
                            
                            // if(state.oldMove){
                            //     drawColoredSquare(state.oldMove.oldX*squareLength, state.oldMove.oldY*squareLength,oldMoveSquareColor, squareLength)
                            //     drawColoredSquare(state.oldMove.currentX*squareLength, state.oldMove.currentY*squareLength,oldMoveSquareColor, squareLength)
                            // }

                        }
                        else{
                            if(orderFirst){
                                if(x % 2 != 0){
                                    drawWhiteSquare(x * squareLength, y * squareLength, squareLength)
                                }
                                else{
                                    drawBlackSquare(x * squareLength, y * squareLength, squareLength)
                                }
                            }
                            else{
                                if(x % 2 != 0){
                                    drawBlackSquare(x * squareLength, y * squareLength, squareLength)
                                }
                                else{
                                    drawWhiteSquare(x * squareLength, y * squareLength, squareLength)
                                }
                            }
                            //reverseNumber(piece.y,boardHeight)
                            if(state.pieceSelected){
                                if(x == state.pieceSelected.x && y == state.pieceSelected.y){
                                    drawColoredSquare(x*squareLength, reverseNumber(y, boardHeight)*squareLength,availableSquareColor, squareLength)
                                }
                            }

                            // if(state.oldMove){
                            //     drawColoredSquare(state.oldMove.oldX*squareLength, reverseNumber(state.oldMove.oldY,boardHeight)*squareLength,oldMoveSquareColor, squareLength)
                            //     drawColoredSquare(state.oldMove.currentX*squareLength, reverseNumber(state.oldMove.currentY,boardHeight)*squareLength,oldMoveSquareColor, squareLength)
                            // }
                        }
                }
                else if(sq.special){
                    drawColoredSquare(x*squareLength, y * squareLength, specialSquareColor, squareLength)
                }
                else {
                    drawLightedSquare(x * squareLength, y * squareLength, squareLength);
                }

                if(sq.red){
                    drawColoredSquare(x*squareLength, y * squareLength, dangerSquareColor, squareLength)
                }
                else if(sq.grey){
                    drawColoredSquare(x*squareLength, y * squareLength, blockedSquareColor, squareLength)
                }
                
            })
            if(state.oldMove){
                const oldSquare = findSquareByXY(state.board,state.oldMove.oldX, state.oldMove.oldY);
                const newSquare = findSquareByXY(state.board,state.oldMove.currentX, state.oldMove.currentY);
                if(IAM === 'black'){
                    if(!oldSquare.light && !oldSquare.red){
                        drawColoredSquare(state.oldMove.oldX*squareLength, reverseNumber(state.oldMove.oldY,boardHeight)*squareLength,oldMoveSquareColor, squareLength)
                    }
                    if(!newSquare.light){
                        drawColoredSquare(state.oldMove.currentX*squareLength, reverseNumber(state.oldMove.currentY,boardHeight)*squareLength,oldMoveSquareColor, squareLength)
                    }
                }
                else if(IAM === 'white'){
                    if(!oldSquare.light && !oldSquare.red){
                        drawColoredSquare(state.oldMove.oldX*squareLength, state.oldMove.oldY*squareLength,oldMoveSquareColor, squareLength)
                    }
                    if(!newSquare.light){
                        drawColoredSquare(state.oldMove.currentX*squareLength, state.oldMove.currentY*squareLength,oldMoveSquareColor, squareLength)
                    }
                }

            }

            //Draw Pieces
            state.pieces.forEach((piece) => {
                if(IAM == 'black'){
                    drawPiece(piece.x, reverseNumber(piece.y,boardHeight), piece.icon, squareLength)
                }
                else{
                    drawPiece(piece.x, piece.y, piece.icon, squareLength)
                }
            })
            // Start Loop if not started
            if (!window.drawLoopStarted) {
                window.drawLoopStarted = true;
                requestAnimationFrame(drawLoop);
            }

            if (state.won) {
                if (state.won == 'black') {
                    if(IAM == 'black'){
                        forfeitTextButton.innerText = 'You Won'
                        forfeitTextButton.style.paddingLeft = '31px';
                        forfeitTextButton.style.paddingRight = '31px';
                        forfeitTextButton.style.paddingTop = '24px';
                        forfeitTextButton.style.paddingBottom = '24px';
                        forfeitTextButton.style.paddingTop = '14px';
                        forfeitTextButton.style.paddingBottom = '24px';
                        forfeitTextButton.style.paddingBottom = '24px';
                        forfeitTextButton.style.marginRight='0px';

                    }
                    else if(IAM == 'white'){
                        forfeitTextButton.innerText = 'You Lost'
                    }
                    flagImage.style.display ='none'

                    myTurnH1.innerText = 'Black Won'
                }
                else if (state.won == 'white') {

                    if(IAM == 'white'){
                        flagImage.style.display ='none'
                        forfeitTextButton.style.paddingLeft = '31px';
                        forfeitTextButton.style.paddingRight = '31px';
                        forfeitTextButton.style.paddingLeft = '31px';
                        forfeitTextButton.style.paddingTop = '24px';
                        forfeitTextButton.style.paddingBottom = '24px';
                        forfeitTextButton.style.marginRight='0px';

                        myTurnH1.innerText = 'White Won'
                        forfeitTextButton.innerText = 'You Won'
                        enemy.innerText = ''
                        me.innerText = ''
                    }
                    else if(IAM == 'black'){
                        forfeitTextButton.innerText = 'You Lost'
                    }

                }
                else if(state.won === 'tie'){
                        flagImage.style.display ='none'
                        forfeitTextButton.style.paddingLeft = '31px';
                        forfeitTextButton.style.paddingRight = '31px';
                        forfeitTextButton.style.paddingLeft = '31px';
                        forfeitTextButton.style.paddingTop = '24px';
                        forfeitTextButton.style.paddingBottom = '24px';
                        forfeitTextButton.style.marginRight='0px';

                        myTurnH1.innerText = 'Draw'
                        enemy.innerText = ''
                        me.innerText = ''
                        forfeitTextButton.innerText = 'Game ended in a Draw'
                }
            }
        }
        else {
            myTurnH1.innerHTML = `
            <div style="display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 40px; margin-bottom: 40px;">
                <h2 style="color: var(--black-square-color, #4b4747); font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.5em; text-align: center;">Waiting for opponent...</h2>
