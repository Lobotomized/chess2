<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess 2 - Single Player</title>
    <style>
        /* Chess-inspired variables */
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Quicksand:wght@500;700&display=swap');

:root {
    --board-light: #e4d8a5;
    --board-dark: #a67c52;
    --piece-white: #ffffff;
    --piece-black: #000000;
    --highlight: #7ea354;
    --threat: #cc5449;
    --selected: #f7e98e;
    --border-color: #000000;
    --bg-overlay: rgba(240, 230, 200, 0.95);
}

        body {
            background: url('/static/bigMap/forest2.png') center center / cover fixed;
            
            color: #000000; font-weight: bold; font-family: 'Quicksand', sans-serif; font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
                    font-size: 18px;
}

        

        .menu-container {
            width: 90%;
            max-width: 500px;
            background: var(--bg-overlay);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
        }

        h1 .icon { height: 96px; margin-right: 20px; }
        h1 {
            font-family: 'Lilita One', cursive; font-weight: normal; letter-spacing: 1px;
            font-size: 4em;
            margin-top: 0;
            margin-bottom: 30px;
            color: #ffffff;
            -webkit-text-stroke: 2px #000000;
            text-shadow: 0px 4px 0px rgba(0,0,0,0.8), 0px 8px 10px rgba(0,0,0,0.4);
        }

        .menu-button .icon { height: 64px; margin-right: 20px; }
        .menu-button {
            font-family: 'Lilita One', cursive; font-weight: normal; letter-spacing: 1px;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to bottom, #7D5A4A, #4A332A); border-bottom: 6px solid #2d1b15; color: #ffffff;
            -webkit-text-stroke: 2px #000000;
            text-shadow: 0px 4px 0px rgba(0,0,0,0.8), 0px 8px 10px rgba(0,0,0,0.4);
            font-weight: bold;
            cursor: pointer;
            border: 2px solid var(--border-color);
            font-size: 36px;
            box-sizing: border-box;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .menu-button:hover {
            background: linear-gradient(to bottom, #8C6540, #5A3E2B); border-bottom: 6px solid #2d1b15;
            color: #ffffff;
            border-color: var(--selected);
            transform: translateY(2px);
            border-bottom-width: 4px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        
        .icon {
    
    height: 64px;
    width: auto;
    vertical-align: middle;
    margin-right: 15px;
}
        
        .back-button {
            margin-top: 15px;
            font-size: 26px;
            background: linear-gradient(to bottom, #8C6540, #5A3E2B); border-bottom: 6px solid #2d1b15;
            padding: 15px;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.8em; margin-bottom: 20px; }
            h1 .icon { height: 56px; margin-right: 10px; }
            .menu-button { font-size: 22px; padding: 12px; }
            .menu-button .icon { height: 36px; margin-right: 10px; }
            .menu-container { padding: 20px; }
            .back-button { font-size: 20px; padding: 12px; }
        }
        @media (max-width: 360px) {
            h1 { font-size: 2em; }
            h1 .icon { height: 40px; }
            .menu-button { font-size: 16px; padding: 8px; }
            .menu-button .icon { height: 28px; }
            .menu-container { padding: 15px; width: 90%; gap: 12px; }
            .back-button { font-size: 16px; padding: 8px; }
        }
    </style>
    </head>
<body>
    <div class="menu-container">
        <h1>Single Player</h1>
        <a href="/campaign" class="menu-button"><img src="/static/lg/whiteHorse.png" class="icon"> Campaign</a>
        <a href="/rpg-menu" class="menu-button"><img src="/static/lg/whiteGeneral.png" class="icon"> RPG</a>
        <a href="/hotseat-menu" class="menu-button"><img src="/static/lg/whiteRicar.png" class="icon"> Hotseat</a>
        <a href="/customMaps" class="menu-button"><img src="/static/lg/whiteShroom.png" class="icon"> Custom Maps</a>
        
        <a href="/" class="menu-button back-button">Back</a>
    </div>
</body>
</html>
