    <script>
        const socket = io();
        
        socket.on('rooms', (data)=>{
            renderGames(data);
        });

        fetch('/allgames').then(res => res.json()).then(data => renderGames(data));

        function renderGames(allData) {
            let gamesHTML = document.getElementById('games');
            gamesHTML.innerHTML = ``
            
            const modeMap = {
                'raceChoiceChess': 'Chess 2',
                'minichess': 'Mini chess',
                'mongolianChess': 'Mongolian chess',
                'randomChess': 'Random chess',
                'randomchess': 'Random chess',
                'catchthedragon': 'Catch the Dragon',
                'morphingRaceChoiceChess': 'Morphing Chess 2',
                'Classic': 'Classic',
                'classicChess': 'Classic',
                'classiChess': 'Classic',
                'customMap': 'Custom Map'
            };

            allData.forEach((el,index) => {
                const displayName = el.displayName || el.roomId;
                let rawMode = el.mode || el.type || (el.roomData && el.roomData.mode) || 'Classic'; // Fallback if not specified
                const gameMode = modeMap[rawMode] || rawMode;
                
                gamesHTML.innerHTML += `
                <div class="lobbyGame" > 
                    <div style="flex-grow: 1;">
                        <a class="linkHeader" href="/play?roomId=${el.roomId}"><img src="/static/lg/whiteKnight.png" class="icon"> ${displayName}</a>
                        <div class="row">
                            <span class="span"> ${el.players.length} / 2 players</span>
                        </div>
                        <div class="row"> 
                            <a class="startGame" href="/play?roomId=${el.roomId}"><img src="/static/lg/whitePawn.png" class="icon"> Join Game</a>
                        </div>
                        <div class="mobile-game-mode" style="display: none; color: var(--piece-black); font-size: 24px; font-family: 'Lilita One', cursive; margin-top: 10px; text-align: left; width: 100%;">
                            ${gameMode}
                        </div>
                    </div>
                    <div class="desktop-game-mode" style="color: var(--piece-black); padding-right: 15px; font-size: 32px; font-family: 'Lilita One', cursive; text-align: right;">
                        ${gameMode}
                    </div>
                </div>`
            })
            if(allData.length == 0){
                gamesHTML.innerHTML = `<h3 style="color: var(--piece-white); -webkit-text-stroke: 2px var(--piece-black); text-shadow: 0px 4px 0px var(--piece-black); text-align: center; font-family: 'Lilita One', cursive; margin-top: 50px; font-size: 36px;"><img src="/static/lg/whiteKing.png" class="icon"> No Games Available <img src="/static/lg/blackKing.png" class="icon"></h3>`
            }
        }

        let startNewGame = function(){
            let gameName = document.getElementById('gameName').value;
            if(!gameName) {
                showAlert("Please enter a game name");
                return;
            }
            let gameType = document.querySelector('#selectMode')?.value;
            if (gameType === 'customMap') {
                let mapId = document.getElementById('selectCustomMap').value;
                if (!mapId) {
                    showAlert("Please select a custom map");
                    return;
                }
                window.location.replace(`/play?roomId=${gameName}&mode=${gameType}&customGameId=${mapId}`);
            } else {
                window.location.replace(`/play?roomId=${gameName}&mode=${gameType}`);
            }
        }

        function checkCustomMap() {
            let mode = document.getElementById('selectMode').value;
            let mapContainer = document.getElementById('customMapSelectContainer');
            if (mode === 'customMap') {
                mapContainer.style.display = 'block';
                fetchCustomMaps();
            } else {
                mapContainer.style.display = 'none';
            }
        }

        let mapsLoaded = false;
        async function fetchCustomMaps() {
            if (mapsLoaded) return;
            const headers = window.Auth ? window.Auth.getAuthHeaders() : {};
            try {
                let resp = await fetch('/maps', { headers });
                if (!resp.ok) {
                    if (resp.status === 401 || resp.status === 403) {
                        if (window.Auth) window.Auth.showAuthModal();
                    }
                    throw new Error('Failed to fetch maps');
                }
                let data = await resp.json();
                let maps = data.maps || data; 
                let select = document.getElementById('selectCustomMap');
                select.innerHTML = '';
                if (maps.length === 0) {
                    select.innerHTML = '<option value="">No custom maps found</option>';
                } else {
                    maps.forEach(map => {
                        let opt = document.createElement('option');
                        opt.value = map._id;
                        opt.textContent = map.name;
                        select.appendChild(opt);
                    });
                }
                mapsLoaded = true;
            } catch (err) {
                console.error(err);
                document.getElementById('selectCustomMap').innerHTML = '<option value="">Error loading maps</option>';
            }
        }
    </script>
