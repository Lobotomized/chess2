<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess 2 - Custom Maps</title>
    <link rel="stylesheet" href="/src/main.css">
    <style>
        /* Chess-inspired variables */
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Quicksand:wght@500;700&display=swap');

:root {
    --board-light: #e4d8a5;
    --board-dark: #a67c52;
    --piece-white: #ffffff;
    --piece-black: #000000;
    --highlight: #7ea354;
    --threat: #cc5449;
    --selected: #f7e98e;
    --border-color: #000000;
    --bg-overlay: rgba(240, 230, 200, 0.95);
}

        body {
            background: url('/static/bigMap/plains1.png') center center / cover fixed;
            
            color: #000000; font-weight: bold; font-family: 'Quicksand', sans-serif; font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
                    font-size: 18px;
}

        /* Chess board pattern overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 25% 25%, rgba(0,0,0,0.1) 1px, transparent 1px),
                radial-gradient(circle at 75% 75%, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }

        /* Navigation - Chess piece inspired */
        nav {
            width: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            padding: 0;
            display: flex;
            flex-direction: column;
            border-bottom: 4px solid #4a382e;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            position: relative;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 12px 0;
            width: 100%;
        }
        
        .hamburger-menu {
            display: none;
            cursor: pointer;
            padding: 15px;
            align-self: flex-end;
        }
        
        .hamburger-menu span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: #ffffff;
            margin: 5px 0;
            transition: 0.4s;
        }
        
        nav a {
            color: #ffffff;
            text-shadow: none;
            text-decoration: none;
            margin: 0 10px;
            font-size: 26px;
            font-weight: bold;
            text-transform: uppercase;
            flex-shrink: 0;
            padding: 6px 12px;
            border: 2px solid transparent;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
        }
        nav a .icon { height: 32px; }
        nav a:hover {
            color: var(--selected);
            background: rgba(240, 217, 181, 0.1);
            border-color: var(--board-light);
            transform: translateY(2px);
            border-bottom-width: 4px;
        }
        nav a.active {
            color: var(--selected);
            background: rgba(247, 233, 142, 0.2);
            border-color: var(--selected);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        
        .icon {
    
    height: 64px;
    width: auto;
    vertical-align: middle;
    margin-right: 15px;
}

        .container {
            width: 90%;
            max-width: 800px;
            margin-top: 30px;
            background: var(--bg-overlay);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            padding: 30px;
            position: relative;
            margin-bottom: 30px;
        }

        h1 .icon { height: 96px; margin-right: 20px; }
        h1 {
            font-family: 'Lilita One', cursive; font-weight: normal; letter-spacing: 1px;
            color: #ffffff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .map-list {
            list-style: none;
            padding: 0;
            display: grid;
            gap: 15px;
        }

        .map-item {
            background: linear-gradient(to bottom, #8C6540, #5A3E2B); border-bottom: 6px solid #2d1b15;
            border: 2px solid var(--border-color);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .map-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border-color: var(--highlight);
        }

        .map-name {
            font-size: 26px;
            font-weight: bold;
            color: #000000;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .play-button {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(to bottom, #8C6540, #5A3E2B); border-bottom: 6px solid #2d1b15;
            color: var(--board-light);
            text-decoration: none;
            font-size: 26px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
        }

        .play-button:hover {
            background: linear-gradient(to bottom, #8C6540, #5A3E2B); border-bottom: 6px solid #2d1b15;
            color: var(--selected);
            border-color: var(--selected);
            transform: translateY(2px);
            border-bottom-width: 4px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .pagination button {
            background: #f0f0f0;
            color: #000000;
            border: 2px solid var(--border-color);
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif; font-weight: 700;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .pagination button:hover {
            background: var(--board-light);
            border-color: var(--highlight);
            transform: translateY(2px);
            border-bottom-width: 4px;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #ccc;
            transform: none;
        }

        .page-info {
            display: flex;
            align-items: center;
            font-weight: bold;
            color: #000000;
            background: rgba(255,255,255,0.5);
            padding: 0 15px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            html, body {
                min-width: 0;
                width: 100%;
                overflow-x: hidden;
                margin: 0;
                padding: 0;
            }
            
            body {
                background-size: 60px 60px;
            }
            
            nav {
                padding: 0;
                width: 100%;
                overflow: visible;
            }
            
            .hamburger-menu {
                display: block;
            }
            
            .nav-links {
                display: none;
                flex-direction: column;
                padding: 0;
            }
            
            .nav-links.active {
                display: flex;
            }
            
            nav a {
                font-size: 28px;
                margin: 0;
                padding: 15px;
                white-space: normal;
                width: 100%;
                box-sizing: border-box;
                border-top: 1px solid rgba(255,255,255,0.1);
                justify-content: flex-start;
            }
            
            nav::after {
                display: none;
            }
            
            .container {
                width: 92%;
                max-width: 92%;
                padding: 15px;
                margin-top: 15px;
                box-sizing: border-box;
                border-width: 4px;
            }
            
            h1 .icon { height: 96px; margin-right: 20px; }
        h1 {
            font-family: 'Lilita One', cursive; font-weight: normal; letter-spacing: 1px;
                font-size: 26px;
                margin-bottom: 20px;
            }

            .map-item {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding: 12px;
                width: 100%;
                box-sizing: border-box;
                min-width: 0;
            }

            .map-name {
                font-size: 28px;
                justify-content: center;
                word-break: break-all;
            }

            .play-button {
                text-align: center;
                width: 100%;
                box-sizing: border-box;
                padding: 12px;
            }
            
            .icon {
    
    height: 64px;
    width: auto;
    vertical-align: middle;
    margin-right: 15px;
}
        }
        @media (max-width: 480px) {
            h1 { font-size: 24px; margin-bottom: 15px; }
            h1 .icon { height: 48px; margin-right: 10px; }
            .container { padding: 15px; }
            .map-name { font-size: 22px; }
            .play-button { font-size: 20px; padding: 10px; }
            .game-settings { flex-direction: column; align-items: stretch; padding: 10px; }
        }
        @media (max-width: 360px) {
            h1 { font-size: 20px; }
            h1 .icon { height: 36px; margin-right: 8px; }
            .container { padding: 10px; width: 95%; max-width: 95%; }
            .map-name { font-size: 18px; }
            .play-button { font-size: 16px; padding: 8px; }
            .game-settings label { font-size: 16px; }
            .game-settings select { font-size: 16px; padding: 6px; }
        }
    </style>
<script src="/src/modal.js?v=1"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Quicksand:wght@500;700&display=swap');</style>
    </head>
<body>
    <div id="loadingScreen">
        <div class="spinner"></div>
        Loading Assets...
    </div>
    <script>
        window.addEventListener('load', function() {
            const screen = document.getElementById('loadingScreen');
            if(screen) screen.style.display = 'none';
        });
    </script>
    <nav>
        <div class="hamburger-menu" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="/"><img src="/static/lg/whitePawn.png" class="icon"> Main Menu</a>
            <a href="/single-player"><img src="/static/lg/whiteRicar.png" class="icon"> Back</a>
        </div>
    </nav>
    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }
    </script>

    <div class="container">
        <h1><img src="/static/lg/whiteShroom.png" class="icon"> Custom Maps <img src="/static/lg/blackShroom.png" class="icon"></h1>
        
        <div class="game-settings" style="background: rgba(255,255,255,0.5); padding: 15px; border-radius: 12px; border: 2px solid var(--border-color); margin-bottom: 20px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <label for="whiteAI" style="font-weight: bold;">White Player:</label>
                <select id="whiteAI" style="padding: 5px; font-family: 'Quicksand', sans-serif; font-weight: bold; border-radius: 8px; border: 2px solid var(--border-color); background: var(--board-light); color: var(--piece-black);">
                    <option value="">Human</option>
                    <option value="101">AI</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label for="blackAI" style="font-weight: bold;">Black Player:</label>
                <select id="blackAI" style="padding: 5px; font-family: 'Quicksand', sans-serif; font-weight: bold; border-radius: 8px; border: 2px solid var(--border-color); background: var(--board-light); color: var(--piece-black);">
                    <option value="">Human</option>
                    <option value="101">AI</option>
                </select>
            </div>
        </div>

        <ul id="mapList" class="map-list">
            <!-- Maps will be loaded here -->
            <li style="text-align:center; font-style: italic;">Loading maps...</li>
        </ul>
        <div id="pagination" class="pagination"></div>
    </div>

    <script src="/src/auth.js"></script>
    <script>
        const apiUrl = '/maps';

        function fetchMaps(page = 1) {
            const headers = Auth.getToken() ? Auth.getAuthHeaders() : {};

            fetch(`${apiUrl}?page=${page}`, {
                headers: headers
            })
                .then(response => {
                    if (response.status === 401 || response.status === 403) {
                        Auth.showAuthModal();
                        throw new Error('Unauthorized');
                    }
                    return response.json();
                })
                .then(data => {
                    const { maps, pageSize, pageNumber, pageCount, totalMapCount } = data;
                    const mapList = document.getElementById('mapList');
                    mapList.innerHTML = '';
                    
                    if (maps.length === 0) {
                        mapList.innerHTML = '<li style="text-align:center; padding: 20px;">No custom maps found. Create one in the Board Editor!</li>';
                        return;
                    }

                    maps.forEach(map => {
                        const listItem = document.createElement('li');
                        listItem.className = 'map-item';
                        
                        let deleteBtnHtml = '';
                        if (map.isAuthor) {
                            deleteBtnHtml = `<button onclick="deleteMap('${map._id}')" class="play-button" style="background: linear-gradient(to bottom, #8C6540, #5A3E2B); border-bottom: 6px solid #2d1b15; color: white; cursor: pointer;">Delete</button>`;
                        }

                        listItem.innerHTML = `
                            <span class="map-name"><img src="/static/lg/whitePawn.png" style="height:20px;"> ${map.name} ${map.isGrandMap ? '<span style="font-size:12px; background:#4a148c; color:white; padding:2px 6px; border-radius:4px; margin-left:5px;">Grand Map</span>' : ''} ${!map.isAuthor ? '<span style="font-size:12px; background:#666; color:white; padding:2px 6px; border-radius:4px; margin-left:5px;">Public</span>' : ''}</span>
                            <div style="display: flex; gap: 10px; flex-shrink: 0;">
                                <a href="javascript:void(0)" onclick="playCustomMap('${map._id}', ${map.isGrandMap})" class="play-button">Play Map</a>
                                ${deleteBtnHtml}
                            </div>
                        `;
                        
                        mapList.appendChild(listItem);
                    });

                    // Pagination
                    const paginationContainer = document.getElementById('pagination');
                    paginationContainer.innerHTML = '';

                    if (pageNumber > 1) {
                        const prevBtn = document.createElement('button');
                        prevBtn.textContent = 'Previous';
                        prevBtn.onclick = () => fetchMaps(pageNumber - 1);
                        paginationContainer.appendChild(prevBtn);
                    }

                    if (pageCount > 1) {
                        const pageInfo = document.createElement('span');
                        pageInfo.className = 'page-info';
                        pageInfo.textContent = `Page ${pageNumber} of ${pageCount}`;
                        paginationContainer.appendChild(pageInfo);
                    }

                    if (pageNumber < pageCount) {
                        const nextBtn = document.createElement('button');
                        nextBtn.textContent = 'Next';
                        nextBtn.onclick = () => fetchMaps(pageNumber + 1);
                        paginationContainer.appendChild(nextBtn);
                    }
                })
                .catch(error => {
                    console.error('Error fetching maps:', error);
                    document.getElementById('mapList').innerHTML = '<li style="text-align:center; color: var(--threat); padding: 20px;">Failed to load maps</li>';
                });
        }

        // Initial load
        fetchMaps(1);

        async function deleteMap(id) {
            if (await showConfirm('Are you sure you want to delete this custom map?')) {
                try {
                    const response = await fetch(`${apiUrl}/${id}`, {
                        method: 'DELETE',
                        headers: Auth.getAuthHeaders()
                    });

                    if (response.ok) {
                        await showAlert('Map deleted successfully!');
                        fetchMaps(1);
                    } else {
                        const error = await response.json();
                        await showAlert('Error deleting map: ' + (error.error || 'Unknown error'));
                    }
                } catch (error) {
                    console.error('Error deleting map:', error);
                    await showAlert('Failed to delete map.');
                }
            }
        }

        function playCustomMap(mapId, isGrandMap) {
            if (isGrandMap) {
                window.location.href = `/rpg.html?customMapId=${mapId}`;
            } else {
                let whiteAI = document.getElementById('whiteAI').value;
                let blackAI = document.getElementById('blackAI').value;
                
                let url = `/hotseat?gameType=customMap&customGameId=${mapId}`;
                
                let aiColor = '';
                let aiPower = '';

                if (whiteAI && blackAI) {
                    aiColor = '&AIColor=all';
                    aiPower = `&AIPowerWhite=${whiteAI}&AIPowerBlack=${blackAI}`;
                } else if (whiteAI) {
                    aiColor = '&AIColor=white';
                    aiPower = `&AIPowerWhite=${whiteAI}`;
                } else if (blackAI) {
                    aiColor = '&AIColor=black';
                    aiPower = `&AIPowerBlack=${blackAI}`;
                }
                
                window.location.href = url + aiColor + aiPower;
            }
        }
    </script>
</body>
</html>
